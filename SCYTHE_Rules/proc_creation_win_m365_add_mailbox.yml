title: Add-MailboxPermission PowerShell Cmdlet Execution
id: 4c7f11a8-1d47-4ced-bce1-e88233f33337
status: experimental
description: Detects execution of the Add-MailboxPermission PowerShell cmdlet, which grants mailbox access permissions. Adversaries may abuse this cmdlet to gain access to other users' mailboxes for email interception or data theft.
references:
    - https://support.scythe.io/knowledge/m365
author: Tyler Casey, SCYTHE
date: 2024-03-27
tags:
    - attack.persistence
    - attack.t1098.002
    - attack.collection
    - attack.t1114.002
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_cmdlet:
        CommandLine|contains: 'Add-MailboxPermission'
    condition: all of selection_*
falsepositives:
    - Legitimate Exchange administration
    - Helpdesk operations granting mailbox access
level: medium
