title: SharePoint File Deletion in Microsoft 365
id: 8cf34e39-13f1-43c9-a7fc-5acc1a0ee706
status: experimental
description: Detects file deletion events from SharePoint recorded in Microsoft 365 audit logs. Mass file deletion may indicate data destruction, anti-forensics activity, or ransomware behavior targeting cloud-hosted documents.
references:
    - https://support.scythe.io/knowledge/m365-sharepoint-document-spray
author: Tyler Casey, SCYTHE
date: 2024-04-29
tags:
    - attack.impact
    - attack.t1485
    - attack.t1070.004
logsource:
    category: audit
    product: m365
detection:
    selection_operation:
        Operation|contains:
            - 'FileDeleted'
            - 'Deleted File'
    selection_workload:
        Workload: 'SharePoint'
    condition: all of selection_*
falsepositives:
    - Legitimate file deletions by users
    - Automated cleanup processes
level: medium
