title: StopCrypt Ransomware Command Line Parameters
id: 29c87ffe-bb8b-49cc-9409-582d112c84d0
status: experimental
description: Detects the distinctive command line parameters '--Admin IsNotAutoStart IsNotTask' used by StopCrypt ransomware during execution. These parameters are characteristic of this ransomware family and indicate an active infection.
references:
    - https://blog.sonicwall.com/en-us/2024/03/new-multi-stage-stopcrypt-ransomware/
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/04/04
tags:
    - attack.execution
    - attack.t1059
    - attack.impact
    - attack.t1486
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|endswith:
            - '--Admin IsNotAutoStart IsNotTask'
    condition: selection
falsepositives:
    - Unlikely; these parameters are specific to StopCrypt ransomware.
level: high
