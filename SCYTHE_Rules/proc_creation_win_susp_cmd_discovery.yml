title: Discovery Commands Spawned from Non-Shell Parent Process
id: 8e2ad471-257f-49f3-8e45-0da1ec8a62b9
status: experimental
description: Detects execution of common discovery commands (whoami, ipconfig, hostname) that are not spawned by cmd.exe or PowerShell. When these commands are executed by unusual parent processes, it may indicate malware or an attacker performing reconnaissance without using a visible command prompt.
references:
    - https://support.scythe.io/knowledge/march-2024-ioc-applejeus
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/03/13
tags:
    - attack.discovery
    - attack.t1033
    - attack.t1016
    - attack.t1082
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        Image|endswith:
            - '\whoami.exe'
            - '\ipconfig.exe'
            - '\hostname.exe'
    filter_parent_img:
        ParentImage|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\powershell_ise.exe'
            - '\pwsh.exe'
    condition: selection_img and not filter_parent_img
falsepositives:
    - Scripts or automation tools that spawn discovery commands directly.
level: medium
