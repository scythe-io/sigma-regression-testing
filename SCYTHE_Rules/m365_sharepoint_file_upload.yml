title: SharePoint File Upload in Microsoft 365
id: 162b7a4f-4d32-4d05-bc8b-37fb586aa1a0
status: experimental
description: Detects file upload events to SharePoint recorded in Microsoft 365 audit logs. While uploads are normal activity, unusual patterns may indicate data staging for exfiltration or malware distribution via cloud storage.
references:
    - https://support.scythe.io/knowledge/m365-sharepoint-document-spray
author: Tyler Casey, SCYTHE
date: 2024-04-29
tags:
    - attack.collection
    - attack.t1213.002
    - attack.exfiltration
    - attack.t1567.002
logsource:
    category: audit
    product: m365
detection:
    selection_operation:
        Operation|contains:
            - 'FileUploaded'
            - 'Uploaded File'
    selection_workload:
        Workload: 'SharePoint'
    condition: all of selection_*
falsepositives:
    - Normal file uploads by users
    - Automated backup or sync processes
level: low
