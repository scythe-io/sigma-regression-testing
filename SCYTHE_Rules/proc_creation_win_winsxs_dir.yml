title: Process Execution from Windows SxS Assembly Directory
id: b3157617-7d1d-43db-8990-16ca0a1e9d19
status: experimental
description: Detects process execution originating from the Windows SxS (side-by-side) assembly directory. Adversaries may abuse the SxS directory for DLL side-loading attacks by placing malicious DLLs alongside legitimate executables.
references:
    - https://support.scythe.io/knowledge/april-2024-winsxs-sideloading
author: Tyler Casey, SCYTHE
date: 2024-04-22
tags:
    - attack.t1574.001
    - attack.t1059
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        - ParentImage|contains: '\Windows\WinSxS\'
        - Image|contains: '\Windows\WinSxS\'
    filter_main_legitimate:
        Image|endswith: '\TiWorker.exe'
    condition: selection and not filter_main_legitimate
falsepositives:
    - Legitimate Windows servicing operations
level: medium
