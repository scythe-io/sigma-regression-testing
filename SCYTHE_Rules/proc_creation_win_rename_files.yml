title: Potential File Masquerading via PowerShell Rename-Item
id: c3d7e891-4b2a-4f5c-9a8d-7e6f4b3c2a19
status: experimental
description: Detects PowerShell Rename-Item commands that change file extensions from common document formats (PDF, DOCX, XLSX) to image or log extensions (JPG, PNG, LOG, TXT). This technique is commonly used by adversaries to masquerade sensitive files and evade detection during exfiltration.
references:
    - https://support.scythe.io/
author: Tyler Casey, SCYTHE
date: 2024-01-16
tags:
    - attack.t1036.008
    - attack.t1059.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_powershell:
        - Image|endswith: '\powershell.exe'
        - OriginalFileName: 'PowerShell.EXE'
    selection_rename:
        CommandLine|contains:
            - 'Rename-Item'
            - 'ren '
            - 'rni '
    selection_suspicious_ext:
        CommandLine|contains:
            - '.pdf'
            - '.docx'
            - '.xlsx'
            - '.xls'
    selection_target_ext:
        CommandLine|contains:
            - '.jpg'
            - '.png'
            - '.log'
            - '.txt'
    condition: all of selection_*
falsepositives:
    - Legitimate file organization scripts
    - Image conversion utilities
    - Log rotation scripts
level: medium
