title: Notepad++ Spawns Command Shell Process
id: 58512062-2366-42b5-83d3-0b3732dbcb7e
status: experimental
description: Detects Notepad++ spawning command shell processes (cmd.exe or PowerShell), a behavior associated with Pikabot malware which abuses Notepad++ plugins to execute malicious code while appearing as legitimate text editor activity.
references:
    - https://support.scythe.io/knowledge/empower-1-feb2024-pikabot
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/02/27
tags:
    - attack.execution
    - attack.t1059
    - attack.t1059.001
    - attack.t1059.003
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith:
            - '\notepad++.exe'
    selection_process:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
    condition: selection_parent and selection_process
falsepositives:
    - Users running scripts or commands through Notepad++ plugin functionality.
level: high
