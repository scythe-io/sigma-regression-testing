title: Registry Modification via REG Command in Command Shell
id: bb7b4970-db14-4e44-a501-0d99021d50ef
status: experimental
description: Detects PowerShell or CMD processes executing REG commands to add or delete registry values. Adversaries commonly modify registry keys for persistence, defense evasion, or privilege escalation.
references:
    - https://support.scythe.io/knowledge/powershell-profile-persistence
author: Tyler Casey, SCYTHE
date: 2024-09-03
tags:
    - attack.t1112
    - attack.t1547.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_shell:
        - OriginalFileName:
            - 'PowerShell.EXE'
            - 'pwsh.dll'
            - 'Cmd.exe'
        - Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\cmd.exe'
    selection_reg:
        CommandLine|contains: ' reg '
    selection_action:
        CommandLine|contains:
            - ' add '
            - ' delete '
    condition: all of selection_*
falsepositives:
    - Legitimate registry modifications by administrators
    - Software installation scripts
level: medium
