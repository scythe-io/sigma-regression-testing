title: Linux Discovery Commands Spawned from Non-Shell Parent
id: bee3c1ea-8508-48b8-b641-cffbefd45e3d
status: experimental
description: Detects execution of Linux discovery commands (ip, ss, hostname) that are not spawned from typical user shells. This pattern may indicate malware performing system reconnaissance directly without interactive shell access.
references:
    - https://unit42.paloaltonetworks.com/new-linux-variant-bifrost-malware/
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/03/18
tags:
    - attack.discovery
    - attack.t1082
    - attack.execution
    - attack.t1059.004
logsource:
    product: linux
    category: process_creation
detection:
    selection_cmdline:
        CommandLine|contains:
            - 'ip '
            - 'ss '
            - 'hostname'
    filter_shell:
        ParentImage|endswith:
            - '/bash'
            - '/sh'
            - '/zsh'
            - '/fish'
    condition: selection_cmdline and not filter_shell
falsepositives:
    - Cron jobs or automated scripts that run discovery commands.
level: low
