title: Docker Container Image Load from Suspicious Location
id: 735d6acc-7ed0-4ffb-bb18-c136cf6dd1b8
status: experimental
description: Detects the loading of Docker container images via 'docker load' command from suspicious locations. Adversaries may load malicious container images to deploy backdoors, cryptominers, or other malware while bypassing traditional endpoint security controls.
references:
    - https://support.scythe.io/knowledge/malicious-docker-container
    - https://attack.mitre.org/techniques/T1610/
author: Tyler Casey, SCYTHE
date: 2024-09-04
modified: 2026-01-23
tags:
    - attack.execution
    - attack.t1610
    - attack.defense_evasion
    - attack.t1612
logsource:
    category: process_creation
    product: linux
detection:
    selection_docker:
        Image|endswith:
            - '/docker'
            - '/podman'
            - '/nerdctl'
    selection_load:
        CommandLine|contains:
            - ' load '
            - ' load -i'
            - ' load --input'
            - ' import '
    filter_cicd:
        ParentImage|endswith:
            - '/jenkins'
            - '/gitlab-runner'
            - '/github-runner'
            - '/drone-runner'
            - '/circleci-agent'
            - '/buildkitd'
    filter_orchestration:
        ParentImage|endswith:
            - '/kubelet'
            - '/containerd'
            - '/dockerd'
            - '/crio'
    selection_suspicious_paths:
        CommandLine|contains:
            - '/tmp/'
            - '/var/tmp/'
            - '/dev/shm/'
            - '/home/'
            - '/root/'
            - 'http://'
            - 'https://'
    condition: (all of selection_* and not 1 of filter_*) or (selection_docker and selection_load and selection_suspicious_paths)
falsepositives:
    - Legitimate container deployment workflows
    - CI/CD pipelines not covered by filters
    - Local development environments
level: medium
