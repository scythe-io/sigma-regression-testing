title: Suspicious Command Shell Spawned by PDF Viewer
id: 9e1ab35a-abc8-48f7-8b9e-320da08bed16
status: experimental
description: Detects command shell processes (cmd.exe, powershell.exe) spawned by PDF viewer applications while a PDF file is open. This behavior may indicate exploitation of PDF vulnerabilities or malicious PDF documents executing embedded code.
references:
    - https://support.scythe.io/knowledge/empower-threat-feb2024-coldriver-spica
author: Tyler Casey, SCYTHE
date: 2024-02-28
tags:
    - attack.execution
    - attack.t1059.001
    - attack.t1059.003
    - attack.t1204.002
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith:
            - '\AcroRd32.exe'
            - '\Acrobat.exe'
            - '\FoxitReader.exe'
            - '\SumatraPDF.exe'
            - '\msedge.exe'
    selection_pdf:
        ParentCommandLine|contains: '.pdf'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
    condition: all of selection_*
falsepositives:
    - Legitimate PDF features executing helper scripts
level: high
