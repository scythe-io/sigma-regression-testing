title: Potential Azure VM Command Execution via AZ CLI
id: 6745e010-bca4-49a2-9ec2-92a1e7957744
status: experimental
description: Detects execution of 'az vm run-command invoke' which allows running scripts on Azure VMs. Adversaries with Azure access may abuse this capability to execute commands on cloud-hosted virtual machines for lateral movement or persistence.
references:
    - https://support.scythe.io/knowledge/azure-resource-group-backdoor
author: Tyler Casey, SCYTHE
date: 2024-03-28
tags:
    - attack.t1059.001
    - attack.t1021
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains: 'az vm run-command invoke'
    condition: selection
falsepositives:
    - Legitimate Azure VM administration
    - Automation scripts for cloud management
level: medium
