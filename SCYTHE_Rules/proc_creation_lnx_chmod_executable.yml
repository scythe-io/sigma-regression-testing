title: File Permission Change to Executable via Chmod
id: 1162a55c-b682-4833-8e9e-bb4b6ce947b9
status: experimental
description: Detects chmod commands that add executable permissions to files (+x, 777, 755, 644). While chmod is commonly used for legitimate purposes, adversaries may use it to make downloaded payloads or scripts executable before execution.
references:
    - https://support.scythe.io/knowledge/systemd-persistence
author: Tyler Casey, SCYTHE
date: 2024-06-28
tags:
    - attack.t1059.004
    - attack.t1222.002
logsource:
    category: process_creation
    product: linux
detection:
    selection_img:
        Image|endswith: '/chmod'
    selection_permissions:
        CommandLine|contains:
            - '+x'
            - '777'
            - '755'
    condition: all of selection_*
falsepositives:
    - Legitimate software installation scripts
    - System administration tasks
level: low
