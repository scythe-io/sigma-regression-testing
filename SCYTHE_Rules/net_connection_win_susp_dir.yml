title: Potential Data Exfiltration via HTTPS From Non-Standard Directory
id: 6c9a1e42-0b8d-4f0a-9e62-3b9c4b8e1a77
status: experimental
description: Detects outbound HTTPS connections (port 443) initiated by processes running from non-standard locations outside of Program Files or System32 directories. This behavior may indicate malicious tools or malware performing command-and-control communication or data exfiltration.
references:
    - https://support.scythe.io/
author: Tyler Casey, SCYTHE
date: 2026-01-16
tags:
    - attack.t1041
    - attack.t1071.001
logsource:
    product: windows
    category: network_connection
detection:
    selection:
        Initiated: 'true'
        DestinationPort: 443
    filter_main_legit_paths:
        Image|contains:
            - '\Program Files\'
            - '\Program Files (x86)\'
            - '\Windows\System32\'
            - '\Windows\SysWOW64\'
    condition: selection and not filter_main_legit_paths
falsepositives:
    - Legitimate software installed in non-standard directories
    - Portable applications
    - Enterprise scripts or custom tooling communicating over HTTPS
level: medium
