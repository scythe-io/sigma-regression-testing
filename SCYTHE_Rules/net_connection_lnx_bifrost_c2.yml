title: Bifrost Malware C2 Communication
id: 598d9b3d-a532-462b-943e-6f0edbe187e1
status: experimental
description: Detects network connections to known Bifrost malware command-and-control infrastructure including IP addresses and typosquatting domains masquerading as VMware. Bifrost is a Linux backdoor that provides remote access capabilities.
references:
    - https://unit42.paloaltonetworks.com/new-linux-variant-bifrost-malware/
author: Tyler Casey, SCYTHE
date: 2024-03-18
tags:
    - attack.t1071.001
logsource:
    product: linux
    category: network_connection
detection:
    selection_ip:
        DestinationIp:
            - '45.91.82.127'
            - '168.95.1.1'
    selection_domain:
        DestinationHostname|contains: 'download.vmfare.com'
    condition: selection_ip or selection_domain
falsepositives:
    - Unknown
level: high
