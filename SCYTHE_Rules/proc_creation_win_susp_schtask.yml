title: Scheduled Task Creation via PowerShell or Command Shell
id: 1c001601-0563-4458-99c2-7addad4fe601
status: experimental
description: Detects scheduled task creation using PowerShell cmdlets (New-ScheduledTask) or schtasks.exe via command shells. Adversaries commonly abuse scheduled tasks for persistence and privilege escalation.
references:
    - https://support.scythe.io/knowledge/empower-threat-feb2024-coldriver-spica
author: Tyler Casey, SCYTHE
date: 2024-02-28
tags:
    - attack.persistence
    - attack.t1053.005
    - attack.execution
    - attack.t1059
logsource:
    product: windows
    category: process_creation
detection:
    selection_shell:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\cmd.exe'
    selection_schtask:
        CommandLine|contains:
            - 'New-ScheduledTask'
            - 'schtasks'
            - '/create'
    condition: all of selection_*
falsepositives:
    - Legitimate administrative scheduled task creation
    - Software installation scripts
level: medium
