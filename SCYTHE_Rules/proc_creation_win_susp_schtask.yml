title: Suspicious Scheduled Task Creation
id: 1c001601-0563-4458-99c2-7addad4fe601
status: experimental
description: Detects scheduled task creation with suspicious characteristics. Adversaries commonly abuse scheduled tasks for persistence and privilege escalation.
references:
    - https://support.scythe.io/knowledge/empower-threat-feb2024-coldriver-spica
    - https://attack.mitre.org/techniques/T1053/005/
author: Tyler Casey, SCYTHE
date: 2024-02-28
modified: 2026-01-23
tags:
    - attack.persistence
    - attack.t1053.005
    - attack.execution
    - attack.t1059
logsource:
    product: windows
    category: process_creation
detection:
    selection_schtasks:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains: '/create'
    selection_powershell_schtask:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'New-ScheduledTask'
            - 'Register-ScheduledTask'
            - 'New-ScheduledTaskAction'
    selection_suspicious_actions:
        CommandLine|contains:
            - 'cmd.exe'
            - 'powershell.exe'
            - 'pwsh.exe'
            - 'mshta.exe'
            - 'wscript.exe'
            - 'cscript.exe'
            - 'rundll32.exe'
            - 'regsvr32.exe'
            - 'certutil.exe'
            - 'bitsadmin.exe'
    selection_suspicious_paths:
        CommandLine|contains:
            - '\AppData\'
            - '\Temp\'
            - '\ProgramData\'
            - '\Users\Public\'
            - '%APPDATA%'
            - '%TEMP%'
            - '%PUBLIC%'
    filter_parent_installers:
        ParentImage|contains:
            - '\Windows\Installer\'
            - '\Program Files\'
            - '\Program Files (x86)\'
    filter_system_tasks:
        CommandLine|contains:
            - '\Microsoft\Windows\'
            - 'MicrosoftEdgeUpdate'
            - 'GoogleUpdate'
    condition: ((selection_schtasks or selection_powershell_schtask) and selection_suspicious_actions and not 1 of filter_*) or ((selection_schtasks or selection_powershell_schtask) and selection_suspicious_paths and not 1 of filter_*)
falsepositives:
    - Legitimate administrative scheduled task creation
    - Software installation scripts
level: medium
