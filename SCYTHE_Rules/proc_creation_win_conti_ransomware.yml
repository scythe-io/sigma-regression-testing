title: Conti Ransomware Discovery Commands
id: 384d2e63-ff68-43d9-a332-0d3f80d12e58
status: experimental
description: Detects execution of discovery commands commonly associated with Conti ransomware operators during the reconnaissance phase. These commands gather network configuration, system information, and user context.
references:
    - https://support.scythe.io/knowledge/conti-ransomware
    - https://thedfirreport.com/2021/05/12/conti-ransomware/
author: Tyler Casey, SCYTHE
date: 2024-02-09
tags:
    - attack.discovery
    - attack.t1016
    - attack.t1082
    - attack.t1033
logsource:
    product: windows
    category: process_creation
detection:
    selection_ipconfig:
        CommandLine|contains: 'ipconfig /all'
    selection_systeminfo:
        Image|endswith: '\systeminfo.exe'
    selection_whoami:
        Image|endswith: '\whoami.exe'
    selection_net:
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
    condition: 1 of selection_*
falsepositives:
    - System administration tasks
    - Troubleshooting activities
level: low
