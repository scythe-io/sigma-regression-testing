title: Command-Line Download Utility with Custom DNS Server
id: 01d1faae-daa5-48c6-9abd-1af30d7d7862
status: experimental
description: Detects curl or wget execution with custom DNS server configuration (--dns-servers flag). Bifrost malware has been observed using this technique to resolve C2 domains through attacker-controlled DNS servers to evade detection.
references:
    - https://unit42.paloaltonetworks.com/new-linux-variant-bifrost-malware/
author: Tyler Casey, SCYTHE
date: 2024-03-18
tags:
    - attack.t1071.004
    - attack.t1059.004
logsource:
    product: linux
    category: process_creation
detection:
    selection_cmdline:
        CommandLine|contains: '--dns-servers'
    selection_image:
        Image|endswith:
            - '/curl'
            - '/wget'
    condition: all of selection_*
falsepositives:
    - Administrators testing DNS configurations
    - Legitimate scripts using custom DNS
level: medium
