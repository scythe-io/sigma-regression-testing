[default]
dispatch.earliest_time = -30d
dispatch.latest_time = now

[BITSAdmin Downloading Malicious Binaries]
description = Detects usage of BITSAdmin to download malicious code. Inspired by the 2022 Red Canary Threat Detection report.
search = Image="*\\bitsadmin.exe" CommandLine IN ("*download*", "*transfer*")

[DNS Query Request By Regsvr32.EXE]
description = Detects DNS queries initiated by "Regsvr32.exe". Regsvr32 can be abused to load remote COM scriptlets that require DNS resolution before fetching the payload.
search = Image="*\\regsvr32.exe"

[Kimsuky Keylogger Desktops.ini File Creation]
description = Detects file operations involving desktops.ini files, which are used by Kimsuky threat actor's keylogger malware to store captured keystrokes. This file name is intentionally similar to the legitimate desktop.ini but includes an extra 's'.
search = TargetFilename="*desktops.ini*"

[LockBit 3.0 Ransomware File Extension Creation]
description = Detects creation of files with the .HLJkNskOq extension characteristic of LockBit 3.0 ransomware encrypted files. Detection of multiple such files in a short timeframe indicates active ransomware encryption.
search = TargetFilename="*.HLJkNskOq"

[LSASS Process Memory Dump Files]
description = Detects creation of files with names used by different memory dumping tools to create a memory dump of the LSASS process memory, which contains user credentials.
search = TargetFilename IN ("*\\lsass.dmp", "*\\lsass.zip", "*\\lsass.rar", "*\\Andrew.dmp", "*\\Coredump.dmp", "*\\NotLSASS.zip", "*\\PPLBlade.dmp") OR TargetFilename IN ("*\\lsass_2*", "*\\lsassdump*", "*\\lsassdmp*") OR (TargetFilename="*\\lsass*" TargetFilename="*.dmp*") OR (TargetFilename="*SQLDmpr*" TargetFilename="*.mdmp") OR (TargetFilename="nanodump*" TargetFilename="*.dmp")

[Scheduled Task Creation]
description = Detects scheduled task creation via file creation in multiple "\Tasks\" directory
search = TargetFilename IN ("*Windows\\Tasks*", "*Windows\\System32\\Tasks*", "*Windows\\SYSWOW64\\Tasks*") NOT TargetFilename="*Windows\\System32\\Tasks\\Microsoft\\*"

[Startup Folder File Write]
description = A General detection for files being created in the Windows startup directory. This could be an indicator of persistence.
search = TargetFilename="*\\Microsoft\\Windows\\Start Menu\\Programs\\StartUp*" NOT (Image="C:\\Windows\\System32\\wuauclt.exe" OR TargetFilename="C:\\$WINDOWS.~BT\\NewOS\\*")

[Suspicious Archive Creation]
description = Detects suspicious archive creation by uncommon processes. This technique is utilized by Cold River Group's SPICA, and TrueBot malware loader.
search = TargetFilename IN ("*.zip*", "*.7z*", "*.tar*", "*.wim*") OR CommandLine IN ("*.zip*", "*.7z*", "*.tar*", "*.wim*") NOT (Image IN ("*\\7z.exe", "*\\7zg.exe", "*\\7zr.exe", "*\\7za.exe", "*\\explorer.exe"))

[Suspicious Startup Folder Persistence]
description = Detects when a file with a suspicious extension is created in the startup folder
search = TargetFilename="*\\Windows\\Start Menu\\Programs\\Startup\\*" TargetFilename IN ("*.vbs", "*.vbe", "*.bat", "*.ps1", "*.hta", "*.dll", "*.jar", "*.msi", "*.scr", "*.cmd", "*.exe")

[Executable File Creation in User Temp Directories]
description = Detects creation of executable files in user temp directories (AppData\Local) by processes outside of Program Files. This technique is commonly used by malware including StopCrypt ransomware to stage payloads before execution.
search = TargetFilename="*\\AppData\\Local\\*" TargetFilename IN ("*.exe", "*.ps1", "*.bat", "*.msi", "*.py", "*.wsf", "*.com", "*.vbs") NOT (Image IN ("*\\Program Files\\*", "*\\Program Files (x86)\\*")) NOT TargetFilename="*PSScriptPolicyTest*"

[Network Connection Initiated By Regsvr32.EXE]
description = Detects a network connection initiated by "Regsvr32.exe", which can be used to load remote COM scriptlets for code execution and defense evasion.
search = Initiated="true" Image="*\\regsvr32.exe"

[Rundll32 Internet Connection]
description = Detects a rundll32 that communicates with public IP addresses
search = Image="*\\rundll32.exe" Initiated="true" NOT (DestinationIp="127.0.0.0/8" OR DestinationIp="10.0.0.0/8" OR DestinationIp="172.16.0.0/12" OR DestinationIp="192.168.0.0/16" OR DestinationIp="169.254.0.0/16" OR DestinationIp="::1/128" OR DestinationIp="fe80::/10" OR DestinationIp="fc00::/7" OR DestinationIp="20.0.0.0/8" OR DestinationIp="51.103.0.0/16" OR DestinationIp="51.104.0.0/16" OR DestinationIp="51.105.0.0/16" OR CommandLine="*\\system32\\PcaSvc.dll,PcaPatchSdbTask" OR SourceHostname="*.internal.cloudapp.net" OR (ParentImage="C:\\Windows\\System32\\svchost.exe" DestinationPort=443))

[Possible File Exfiltration from Non-Standard Directory Over HTTPS]
description = Detects network connections over HTTPS (port 443) initiated by processes not running from Program Files or System32 directories. This may indicate suspicious tools or malware performing command-and-control or exfiltration.
search = Initiated="true" DestinationPort=443 NOT (Image IN ("*\\Program Files\\*", "*\\Program Files (x86)\\*", "*\\System32\\*"))

[Suspicious Eventlog Clear]
description = Detects usage of known powershell cmdlets such as "Clear-EventLog" to clear the Windows event logs
search = ScriptBlockText IN ("*Clear-EventLog *", "*Remove-EventLog *", "*Limit-EventLog *", "*Clear-WinEvent *")

[PowerShell Base64 Encoding]
description = Looks for the execution of powershell.exe with command lines that includes the term base64. Inspired by the 2022 Red Canary Threat Detection report.
search = CommandLine="*base64*" Image="*\\powershell.exe"

[PPLBlade LSASS Protection Bypass Tool Execution]
description = Detects execution of PPLBlade, a tool designed to bypass Protected Process Light (PPL) protection on LSASS to enable credential dumping. The tool uses specific command line parameters for mode selection, handle manipulation, and obfuscation that can be detected.
search = Image="*\\PPLBlade.exe" CommandLine IN ("*--mode*", "*--handle*", "*--obfuscate*")

[ALPHV BlackCat Symlink Evaluation Enabled via Fsutil]
description = Detects fsutil commands enabling remote-to-local (R2L) and remote-to-remote (R2R) symbolic link evaluation. ALPHV/BlackCat ransomware uses this technique to follow symlinks across network shares for broader file encryption.
search = Image="*\\fsutil.exe" CommandLine IN ("*behavior set SymlinkEvaluation R2L:1*", "*behavior set SymlinkEvaluation R2R:1*")

[ALPHV BlackCat VM and Shadow Copy Deletion Commands]
description = Detects execution of commands used by ALPHV/BlackCat ransomware to delete virtual machines, snapshots, Windows event logs, and shadow copies. These actions are performed to hinder recovery and destroy evidence.
search = CommandLine IN ("*esxcli vm process kill --type=force*", "*vim-cmd vmsvc/snapshot.removeall*", "*vssadmin.exe delete shadows*", "*wevtutil.exe cl*")

[Audit Policy Tampering Via Auditpol]
description = Threat actors can use auditpol binary to change audit policy configuration to impair detection capability. \
This can be carried out by selectively disabling/removing certain audit policies as well as restoring a custom policy owned by the threat actor.
search = Image="*\\auditpol.exe" OR OriginalFileName="AUDITPOL.EXE" CommandLine IN ("*disable*", "*clear*", "*remove*", "*restore*")

[Azure VM Run-Command Execution]
description = Detects execution of Azure CLI 'az vm run-command invoke' from a Windows host. This command allows remote code execution on Azure VMs and is rarely used interactively. Unexpected executions may indicate lateral movement or an attacker leveraging Azure infrastructure for persistence.
search = CommandLine="*az vm run-command invoke*"

[Azure CLI Discovery Commands]
description = Detects execution of Azure CLI commands used for infrastructure reconnaissance from a Windows host. Multiple Azure discovery commands executed in a short timeframe may indicate an attacker enumerating cloud resources after compromising credentials or a host with Azure CLI access.
search = CommandLine IN ("*az vm run-command*", "*az vm show*", "*az network nic*", "*az network nsg*", "*az network public-ip*", "*az vm list*")

[File Download Via Bitsadmin]
description = Detects usage of bitsadmin downloading a file, which can be abused by attackers for ingress tool transfer and defense evasion.
search = Image="*\\bitsadmin.exe" OR OriginalFileName="bitsadmin.exe" CommandLine="* /transfer *" OR (CommandLine IN ("* /create *", "* /addfile *") CommandLine="*http*")

[Browser Credential Theft via Login Data File Access]
description = Detects access to browser credential storage files (Chrome, Edge, Firefox, Opera Login Data) which contain saved usernames and passwords. Adversaries copy these SQLite database files to exfiltrate credentials. Also detects known credential harvesting tools targeting browsers such as LaZagne, WebBrowserPassView, and esentutl-based extraction of Chrome Login Data.
search = CommandLine IN ("*\\Google\\Chrome\\User Data\\Default\\Login Data*", "*\\Microsoft\\Edge\\User Data\\Default\\Login Data*", "*\\Mozilla\\Firefox\\Profiles\\*", "*\\Opera Software\\Opera Stable\\Login Data*") OR Image="*\\lazagne.exe" OR CommandLine="*browsers*" OR Image="*\\WebBrowserPassView.exe" OR (Image="*\\esentutl.exe" CommandLine="*Login Data*")

[File Decoded From Base64/Hex Via Certutil.EXE]
description = Detects the execution of certutil with either the "decode" or "decodehex" flags to decode base64 or hex encoded files. This can be abused by attackers to decode an encoded payload before execution.
search = Image="*\\certutil.exe" OR OriginalFileName="CertUtil.exe" CommandLine IN ("*-decode *", "*-decodehex *", "*/decode *", "*/decodehex *")

[Suspicious Download Via Certutil.EXE]
description = Detects the execution of certutil with certain flags that allow the utility to download files. Certutil is a commonly abused LOLBin for ingress tool transfer and malware staging.
search = Image="*\\certutil.exe" OR OriginalFileName="CertUtil.exe" CommandLine IN ("*urlcache *", "*verifyctl *", "*URL *") CommandLine="*http*"

[File Encoded To Base64 Via Certutil.EXE]
description = Detects the execution of certutil with the "encode" flag to encode a file to base64. This can be abused by threat actors and attackers for data exfiltration
search = Image="*\\certutil.exe" OR OriginalFileName="CertUtil.exe" CommandLine IN ("*-encode*", "*/encode*")

[Suspicious File Encoded To Base64 Via Certutil.EXE]
description = Detects the execution of certutil with the "encode" flag to encode a file to base64 where the extensions of the file is suspicious
search = Image="*\\certutil.exe" OR OriginalFileName="CertUtil.exe" CommandLine IN ("*-encode*", "*/encode*") CommandLine IN ("*.acl*", "*.bat*", "*.doc*", "*.gif*", "*.jpeg*", "*.jpg*", "*.mp3*", "*.pdf*", "*.png*", "*.ppt*", "*.tmp*", "*.xls*", "*.xml*")

[Chrome Electron Proxy Execution via Command Line]
description = Detects attempted proxy execution of commands through Google Chrome using the --utility-cmd-prefix parameter. This technique abuses Electron-based applications to execute arbitrary commands while evading security controls that may not monitor Chrome child processes.
search = ParentImage IN ("*\\powershell.exe", "*\\cmd.exe") Image="*\\chrome.exe" CommandLine="*--utility-cmd-prefix*"

[Adding, Listing and Removing Credentials via Cmdkey CommandLine Ultility]
description = Detects the use of cmdkey to add, remove, or list credentials.
search = Image="*\\cmdkey.exe" CommandLine="* -d*" OR CommandLine="* /d*" OR CommandLine="* â€“d*" OR CommandLine="* â€”d*" OR CommandLine="* â€•d*" OR CommandLine="* -a*" OR CommandLine="* /a*" OR CommandLine="* â€“a*" OR CommandLine="* â€”a*" OR CommandLine="* â€•a*" OR CommandLine="* -l*" OR CommandLine="* /l*" OR CommandLine="* â€“l*" OR CommandLine="* â€”l*" OR CommandLine="* â€•l*"

[Potential Reconnaissance For Cached Credentials Via Cmdkey.EXE]
description = Detects usage of cmdkey to look for cached credentials on the system
search = Image="*\\cmdkey.exe" OR OriginalFileName="cmdkey.exe" CommandLine IN ("* /l*", "* -l*") \
| table CommandLine,ParentCommandLine,User

[Read Contents From Stdin Via Cmd.EXE]
description = Detect the use of "<" to read and potentially execute a file via cmd.exe
search = OriginalFileName="Cmd.Exe" OR Image="*\\cmd.exe" CommandLine="*<*"

[Conti Ransomware Discovery Commands]
description = Detects execution of discovery commands commonly associated with Conti ransomware operators during the reconnaissance phase. These commands gather network configuration, system information, and user context. Single command execution is informational; multiple commands in sequence indicate potential reconnaissance activity.
search = CommandLine="*ipconfig /all*" OR Image="*\\systeminfo.exe" OR Image="*\\whoami.exe" OR (Image IN ("*\\net.exe", "*\\net1.exe") CommandLine IN ("* view*", "* user*", "* group*", "* localgroup*", "* share*", "* session*")) NOT (ParentImage IN ("*\\svchost.exe", "*\\services.exe", "*\\msiexec.exe") OR ParentImage IN ("*\\Program Files\\Microsoft Configuration Manager\\*", "*\\Program Files (x86)\\Microsoft Configuration Manager\\*", "*\\Program Files\\SCCM\\*", "*\\Program Files\\SolarWinds\\*", "*\\Program Files (x86)\\SolarWinds\\*"))

[DLL Search Order Hijacking via Suspicious Copy and Rename]
description = Detects DLL search order hijacking where an attacker copies a legitimate executable to a user-writable directory alongside a malicious DLL with a name that the executable will load before the system-directory version. A common pattern is copying powershell.exe or another trusted binary to %APPDATA% and placing a hijacked amsi.dll or similar DLL in the same folder so Windows loads the attacker-controlled DLL first.
search = CommandLine IN ("*copy *", "*xcopy *", "*Copy-Item*") CommandLine IN ("*\\AppData\\*", "*%APPDATA%*") CommandLine IN ("*amsi.dll*", "*WinAppXRT.dll*", "*ualapi.dll*", "*version.dll*", "*cryptbase.dll*", "*userenv.dll*")

[Windows Event Log Manipulation via PowerShell]
description = Detects Windows event log clearing activity including use of PowerShell cmdlets (Clear-EventLog, Remove-EventLog) or the Windows Security audit log cleared event (EID 1102). Attackers commonly clear event logs to remove evidence of their activities and hinder forensic investigation.
search = source="WinEventLog:Security" EventCode=1102

[Potential Exploitation of CVE-2024-37085 - Suspicious Creation Of ESX Admins Group]
description = Detects execution of the "net.exe" command in order to add a group named "ESX Admins". \
This could indicates a potential exploitation attempt of CVE-2024-37085, which allows an attacker to elevate their privileges to full administrative access on an domain-joined ESXi hypervisor. \
VMware ESXi hypervisors joined to an Active Directory domain consider any member of a domain group named "ESX Admins" to have full administrative access by default.
search = (Image IN ("*\\net.exe", "*\\net1.exe") OR OriginalFileName IN ("net.exe", "net1.exe") CommandLine="*/add*" CommandLine="*/domain*" CommandLine="*ESX Admins*" CommandLine="*group*") OR (Image IN ("*\\PowerShell.exe", "*\\pwsh.exe") OR OriginalFileName IN ("PowerShell.exe", "pwsh.dll") CommandLine="*New-ADGroup*" CommandLine="*ESX Admins*")

[HackTool - Bloodhound/Sharphound Execution]
description = Detects command line parameters used by Bloodhound and Sharphound hack tools
search = Product="*SharpHound*" OR Description="*SharpHound*" OR Company IN ("*SpecterOps*", "*evil corp*") OR Image IN ("*\\Bloodhound.exe*", "*\\SharpHound.exe*") OR CommandLine IN ("* -CollectionMethod All *", "* --CollectionMethods Session *", "* --Loop --Loopduration *", "* --PortScanTimeout *", "*.exe -c All -d *", "*Invoke-Bloodhound*", "*Get-BloodHoundData*") OR (CommandLine="* -JsonFolder *" CommandLine="* -ZipFileName *") OR (CommandLine="* DCOnly *" CommandLine="* --NoSaveCache *")

[HackTool - Mimikatz DCSync Domain Credential Replication]
description = Detects Mimikatz lsadump::dcsync command which abuses the MS-DRSR (Directory Replication Service Remote Protocol) to replicate domain credential hashes without running code on a DC. A critical indicator of domain compromise.
search = (CommandLine="*mimikatz*" CommandLine="*lsadump::dcsync*") OR (CommandLine="*lsadump::dcsync*" CommandLine="*/domain:*")

[HackTool - Mimikatz Pass-the-Hash Execution]
description = Detects Mimikatz sekurlsa::pth command used to perform Pass-the-Hash lateral movement by injecting an NTLM hash into a new process token.
search = (CommandLine="*mimikatz*" CommandLine IN ("*sekurlsa::pth*", "*sekurlsa::logonpasswords*")) OR (CommandLine="*/ntlm:*" CommandLine="*/user:*" CommandLine="*/domain:*")

[HackTool - Rubeus Kerberoasting and AS-REP Roasting]
description = Detects execution of Rubeus, a Kerberos abuse toolkit, used for Kerberoasting (T1558.003) and AS-REP Roasting (T1558.004) attacks to extract service ticket hashes for offline cracking.
search = Image="*\\Rubeus.exe" OR OriginalFileName="Rubeus.exe" OR Description="*Rubeus*" OR CommandLine IN ("* asreproast*", "* kerberoast*", "* dump /luid*", "* dump /service*", "* asktgt /user*", "* asktgs *", "* harvest /interval*", "* s4u *", "* ptt /ticket*", "* /ptt /ticket*", "*renew /ticket*", "* createnetonly*", "* monitor /interval*", "* logonsession*", "*triage*", "*klist*")

[Kerberoasting via Invoke-Kerberoast PowerShell]
description = Detects execution of Invoke-Kerberoast from Empire or PowerSploit frameworks, which requests Kerberos service tickets for accounts with SPNs, enabling offline hash cracking.
search = CommandLine IN ("*Invoke-Kerberoast*", "*Get-DomainSPNTicket*", "*Request-SPNTicket*")

[Kerberoasting SPN Enumeration via Setspn]
description = Detects use of setspn.exe to enumerate all Service Principal Names across the domain, which is a preparatory step for Kerberoasting attacks to identify service accounts with SPNs.
search = Image="*\\setspn.exe" OR OriginalFileName="setspn.exe" CommandLine IN ("* -Q */*", "* -q */*", "* /Q */*", "* /q */*")

[Kimsuky Keylogger Process Execution]
description = Detects execution of klogexe.exe, a keylogger associated with the Kimsuky threat actor. This malware captures keystrokes and stores them in desktops.ini files within APPDATA paths.
search = Image="*\\klogexe.exe" OR OriginalFileName="klogexe.exe" OR CommandLine="*klogexe*" NOT (Image IN ("*\\explorer.exe", "*\\winlogon.exe", "*\\dwm.exe"))

[LockBit 3.0 Ransomware Deletion Commands]
description = Detects execution of commands used by LockBit 3.0 ransomware to delete shadow copies and clear Windows event logs. These actions are performed to prevent system recovery and destroy forensic evidence.
search = CommandLine IN ("*vssadmin.exe delete shadows*", "*wevtutil.exe cl*", "*wmic.exe Shadowcopy Delete*")

[Multiple LOLBAS Discovery Commands in Short Timeframe]
description = Detects multiple LOLBAS discovery commands executed from the same parent process within a short timeframe, which may indicate automated reconnaissance activity.
search = CommandLine IN ("*whoami*", "*vssadmin*", "*msiexec*", "*mstsc*", "*mshta*", "*netsh*", "* set *", "*arp -*", "*netstat*", "*net.exe *", "*w32tm*", "*schtasks*", "*systeminfo*", "*tasklist*", "*ipconfig*", "*qwinsta*", "*quser*") \
 \
| bin _time span=30s \
| stats count as event_count by _time ParentImage \
 \
| search event_count >= 3

[Mavinject Inject DLL Into Running Process]
description = Detects process injection using the signed Windows tool "Mavinject" via the "INJECTRUNNING" flag
search = CommandLine="* /INJECTRUNNING *" NOT ParentImage="C:\\Windows\\System32\\AppVClient.exe"

[Add-MailboxPermission PowerShell Cmdlet Execution]
description = Detects execution of the Add-MailboxPermission PowerShell cmdlet, which grants mailbox access permissions. Adversaries may abuse this cmdlet to gain access to other users' mailboxes for email interception or data theft.
search = Image IN ("*\\powershell.exe", "*\\pwsh.exe") CommandLine="*Add-MailboxPermission*"

[Msiexec Quiet Installation]
description = Adversaries may abuse msiexec.exe to proxy execution of malicious payloads. \
Msiexec.exe is the command-line utility for the Windows Installer and is thus commonly associated with executing installation packages (.msi)
search = Image="*\\msiexec.exe" OR OriginalFileName="msiexec.exe" CommandLine IN ("*/i*", "*-i*", "*/package*", "*-package*", "*/a*", "*-a*", "*/j*", "*-j*") CommandLine IN ("*/q*", "*-q*") NOT ((ParentImage="C:\\Users\\*" ParentImage="*\\AppData\\Local\\Temp\\*") OR ParentImage="C:\\Windows\\Temp\\*" OR (ParentImage="C:\\Windows\\CCM\\Ccm32BitLauncher.exe" IntegrityLevel="System"))

[New Remote Desktop Connection Initiated Via Mstsc.EXE]
description = Detects the usage of "mstsc.exe" with the "/v" flag to initiate a connection to a remote server. \
Adversaries may use valid accounts to log into a computer using the Remote Desktop Protocol (RDP). The adversary may then perform actions as the logged-on user.
search = Image="*\\mstsc.exe" OR OriginalFileName="mstsc.exe" CommandLine="* -v:*" OR CommandLine="* /v:*" OR CommandLine="* â€“v:*" OR CommandLine="* â€”v:*" OR CommandLine="* â€•v:*" NOT (ParentImage="C:\\Windows\\System32\\lxss\\wslhost.exe" CommandLine="*C:\\ProgramData\\Microsoft\\WSL\\wslg.rdp*")

[New Firewall Rule Added Via Netsh.EXE]
description = Detects the addition of a new rule to the Windows firewall via netsh
search = Image="*\\netsh.exe" OR OriginalFileName="netsh.exe" CommandLine="* firewall *" CommandLine="* add *" NOT (CommandLine IN ("*advfirewall firewall add rule name=Dropbox dir=in action=allow \"program=*:\\Program Files (x86)\\Dropbox\\Client\\Dropbox.exe\" enable=yes profile=Any*", "*advfirewall firewall add rule name=Dropbox dir=in action=allow \"program=*:\\Program Files\\Dropbox\\Client\\Dropbox.exe\" enable=yes profile=Any*"))

[Firewall Disabled via Netsh.EXE]
description = Detects netsh commands that turn off the Windows firewall, commonly used by attackers to remove network defenses.
search = Image="*\\netsh.exe" OR OriginalFileName="netsh.exe" (CommandLine="*firewall*" CommandLine="*set*" CommandLine="*opmode*" CommandLine="*disable*") OR (CommandLine="*advfirewall*" CommandLine="*set*" CommandLine="*state*" CommandLine="*off*")

[Domain Discovery via NET Command]
description = Detects the use of net.exe or net1.exe to enumerate domain users, groups, and computers. These commands are commonly used during the discovery phase of an attack to map out Active Directory structure and identify high-value targets.
search = Image IN ("*\\net.exe", "*\\net1.exe") CommandLine IN ("*admins*", "*users*", "*computers*", "*/domain*")

[Network Share Enumeration via Net Commands]
description = Detects network share enumeration using built-in Windows net.exe and net1.exe commands with 'share' or 'view' subcommands. Adversaries use these commands to discover accessible network shares for lateral movement and data exfiltration. The 'net share' command lists local shares while 'net view' discovers remote shares on a specified host or domain.
search = Image IN ("*\\net.exe", "*\\net1.exe") CommandLine IN ("* share*", "* view*")

[Local User Account Creation via New-LocalUser PowerShell Cmdlet]
description = Detects the use of PowerShell's New-LocalUser cmdlet to create local user accounts. Attackers may create local accounts to establish persistence or backdoor access to compromised systems.
search = Image IN ("*\\powershell.exe", "*\\powershell_ise.exe", "*\\pwsh.exe") CommandLine="*New-LocalUser*"

[Process Execution from Windows Defender NisSrv Directory]
description = Detects process execution originating from the Windows Defender Network Inspection Service (NisSrv) directory. Attackers may abuse this trusted location for DLL sideloading or to evade security controls by executing malicious code from within Defender's own directory structure.
search = ParentImage="*Windows Defender\\NisSrv*" OR Image="*Windows Defender\\NisSrv*" NOT (Image IN ("*\\MsMpEng.exe", "*\\NisSrv.exe"))

[Potential Recon Activity Via Nltest.EXE]
description = Detects nltest commands that can be used for information discovery
search = Image="*\\nltest.exe" OR OriginalFileName="nltestrk.exe" (CommandLine="*server*" CommandLine="*query*") OR CommandLine IN ("*/user*", "*all_trusts*", "*dclist:*", "*dnsgetdc:*", "*domain_trusts*", "*dsgetdc:*", "*parentdomain*", "*trusted_domains*")

[Notepad++ Spawns Command Shell Process]
description = Detects Notepad++ spawning command shell processes (cmd.exe or PowerShell), a behavior associated with Pikabot malware which abuses Notepad++ plugins to execute malicious code while appearing as legitimate text editor activity.
search = ParentImage="*\\notepad++.exe" Image IN ("*\\cmd.exe", "*\\powershell.exe", "*\\pwsh.exe")

[NTLM Relay and LLMNR/NBT-NS Poisoning Tool Execution]
description = Detects execution of tools commonly used for LLMNR/NBT-NS poisoning and NTLM relay attacks, including Responder, Inveigh, and related utilities. These tools respond to broadcast name resolution requests to capture Net-NTLMv2 hashes or relay credentials to other services. The detection covers PowerShell-based invocation of Inveigh (via IEX download) and process names associated with Responder.
search = (Image IN ("*\\Responder.exe", "*\\MultiRelay.exe") Image="*Responder*") OR (CommandLine="*Inveigh*" CommandLine="*Invoke-Inveigh*") OR CommandLine IN ("*Invoke-Inveigh*", "*-NBNS Y*", "*-MDNS Y*", "*-LLMNR Y*") OR (Image IN ("*\\powershell.exe", "*\\pwsh.exe") CommandLine="*Inveigh*")

[Suspicious Office Application Child Process - Malicious Document Execution]
description = Detects Office applications (Word, Excel, PowerPoint, Outlook) spawning suspicious child processes such as cmd.exe, powershell.exe, wscript.exe, cscript.exe, and mshta.exe. This is a strong indicator of malicious document (maldoc) execution.
search = ParentImage IN ("*\\WINWORD.EXE", "*\\EXCEL.EXE", "*\\POWERPNT.EXE", "*\\MSPUB.EXE", "*\\VISIO.EXE", "*\\OUTLOOK.EXE", "*\\msaccess.exe") Image IN ("*\\cmd.exe", "*\\powershell.exe", "*\\pwsh.exe", "*\\wscript.exe", "*\\cscript.exe", "*\\mshta.exe", "*\\regsvr32.exe", "*\\rundll32.exe", "*\\msiexec.exe", "*\\wmic.exe", "*\\certutil.exe", "*\\bitsadmin.exe", "*\\msbuild.exe", "*\\installutil.exe", "*\\schtasks.exe", "*\\regasm.exe", "*\\regsvcs.exe")

[New Service Creation Using PowerShell]
description = Detects the creation of a new service using powershell.
search = CommandLine="*New-Service*" CommandLine="*-BinaryPathName*"

[Non Interactive PowerShell Process Spawned]
description = Detects non-interactive PowerShell activity by looking at the "powershell" process with a non-user GUI process such as "explorer.exe" as a parent.
search = Image IN ("*\\powershell.exe", "*\\pwsh.exe") OR OriginalFileName IN ("PowerShell.EXE", "pwsh.dll") NOT (ParentImage IN ("*:\\Windows\\explorer.exe", "*:\\Windows\\System32\\CompatTelRunner.exe", "*:\\Windows\\SysWOW64\\explorer.exe") OR ParentImage=":\\$WINDOWS.~BT\\Sources\\SetupHost.exe") NOT ((ParentImage="*\\AppData\\Local\\Programs\\Microsoft VS Code\\Code.exe" ParentCommandLine="* --ms-enable-electron-run-as-node *") OR (ParentImage="*:\\Program Files\\WindowsApps\\Microsoft.WindowsTerminal_*" ParentImage="*\\WindowsTerminal.exe"))

[Change PowerShell Policies to an Insecure Level]
description = Detects changing the PowerShell script execution policy to a potentially insecure level using the "-ExecutionPolicy" flag.
search = OriginalFileName IN ("PowerShell.EXE", "pwsh.dll") OR Image IN ("*\\powershell.exe", "*\\pwsh.exe") CommandLine IN ("*-executionpolicy *", "* -ep *", "* -exec *") CommandLine IN ("*Bypass*", "*Unrestricted*")

[Process Injection via Mavinject.exe (CreateRemoteThread)]
description = Detects use of mavinject.exe, a Microsoft-signed binary (LOLBIN) that injects a DLL into a running process via CreateRemoteThread. The /INJECTRUNNING flag accepts a target PID and DLL path, making it a commonly abused living-off-the-land technique for process injection to evade endpoint detection products.
search = Image="*\\mavinject.exe" OR CommandLine="*/INJECTRUNNING*"

[Remote Access Software Execution from Non-Standard Directory]
description = Detects execution of remote access software (AnyDesk, TeamViewer, ScreenConnect) from directories outside their standard installation paths. ALPHV/BlackCat and Scattered Spider threat actors commonly deploy these tools from unusual locations to maintain persistent remote access while evading detection.
search = Image IN ("*\\AnyDesk.exe", "*\\TeamViewer.exe", "*\\ScreenConnect.exe") NOT (Image IN ("*\\AppData\\*", "*\\Program Files (x86)\\*", "*\\Program Files\\*"))

[Remote Access Software Execution from Non-Standard Directory - Sysmon]
description = Detects execution of remote access software (AnyDesk, TeamViewer, ScreenConnect) from non-standard directories via Sysmon Event ID 1. Scattered Spider and other threat actors deploy portable RAS tools to non-standard locations.
search = EventCode=1 (Image="*\\AnyDesk.exe" NOT (Image IN ("*\\AppData\\*", "*\\Program Files (x86)\\AnyDesk*", "*\\Program Files\\AnyDesk*"))) OR (Image="*\\TeamViewer.exe" NOT (Image IN ("*\\AppData\\*", "*\\Program Files (x86)\\TeamViewer*", "*\\Program Files\\TeamViewer*"))) OR (Image="*\\ScreenConnect.exe" NOT (Image IN ("*\\AppData\\*", "*\\Program Files (x86)\\ScreenConnect*", "*\\Program Files\\ScreenConnect*")))

[Potentially Suspicious Child Process Of Regsvr32]
description = Detects potentially suspicious child processes of "regsvr32.exe".
search = ParentImage="*\\regsvr32.exe" Image IN ("*\\calc.exe", "*\\cscript.exe", "*\\explorer.exe", "*\\mshta.exe", "*\\net.exe", "*\\net1.exe", "*\\nltest.exe", "*\\notepad.exe", "*\\powershell.exe", "*\\pwsh.exe", "*\\reg.exe", "*\\schtasks.exe", "*\\werfault.exe", "*\\wscript.exe") NOT (Image="*\\werfault.exe" CommandLine="* -u -p *")

[Potential Persistence Attempt Via Run Keys Using Reg.EXE]
description = Detects suspicious command line reg.exe tool adding key to RUN key in Registry, commonly used for persistence.
search = Image="*\\reg.exe" CommandLine="*reg*" CommandLine="* add *" CommandLine IN ("*Software\\Microsoft\\Windows\\CurrentVersion\\Run*", "*\\Software\\WOW6432Node\\Microsoft\\Windows\\CurrentVersion\\Run*", "*\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer\\Run*")

[Direct Autorun Keys Modification]
description = Detects direct modification of autostart extensibility point (ASEP) in registry using reg.exe.
search = Image="*\\reg.exe" CommandLine="*add*" CommandLine IN ("*\\software\\Microsoft\\Windows\\CurrentVersion\\Run*", "*\\software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\Userinit*", "*\\software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\Shell*", "*\\software\\Microsoft\\Windows NT\\CurrentVersion\\Windows*", "*\\software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\User Shell Folders*", "*\\system\\CurrentControlSet\\Control\\SafeBoot\\AlternateShell*") \
| table CommandLine,ParentCommandLine

[Remote Access Tool - AnyDesk Execution]
description = An adversary may use legitimate desktop support and remote access software, such as Team Viewer, Go2Assist, LogMein, AmmyyAdmin, etc, to establish an interactive command and control channel to target systems within networks. \
These services are commonly used as legitimate technical support software, and may be allowed by application control within a target environment. \
Remote access tools like VNC, Ammyy, and Teamviewer are used frequently when compared with other legitimate software commonly used by adversaries. (Citation: Symantec Living off the Land)
search = Image="*\\AnyDesk.exe" OR Description="AnyDesk" OR Product="AnyDesk" OR Company="AnyDesk Software GmbH"

[Remote Access Tool - Anydesk Execution From Suspicious Folder]
description = An adversary may use legitimate desktop support and remote access software, such as Team Viewer, Go2Assist, LogMein, AmmyyAdmin, etc, to establish an interactive command and control channel to target systems within networks. \
These services are commonly used as legitimate technical support software, and may be allowed by application control within a target environment. \
Remote access tools like VNC, Ammyy, and Teamviewer are used frequently when compared with other legitimate software commonly used by adversaries. (Citation: Symantec Living off the Land)
search = Image="*\\AnyDesk.exe" OR Description="AnyDesk" OR Product="AnyDesk" OR Company="AnyDesk Software GmbH" NOT (Image IN ("*\\AppData\\*", "*Program Files (x86)\\AnyDesk*", "*Program Files\\AnyDesk*"))

[Potential Defense Evasion Via Binary Rename]
description = Detects the execution of a renamed binary often used by attackers or malware leveraging the Sysmon OriginalFileName datapoint. Covers commonly abused utilities like cmd.exe, net.exe, netsh.exe, and compression tools.
search = OriginalFileName IN ("Cmd.Exe", "CONHOST.EXE", "7z.exe", "7za.exe", "WinRAR.exe", "wevtutil.exe", "net.exe", "net1.exe", "netsh.exe", "InstallUtil.exe") NOT (Image IN ("*\\cmd.exe", "*\\conhost.exe", "*\\7z.exe", "*\\7za.exe", "*\\WinRAR.exe", "*\\wevtutil.exe", "*\\net.exe", "*\\net1.exe", "*\\netsh.exe", "*\\InstallUtil.exe"))

[Potential Defense Evasion Via Rename Of Highly Relevant Binaries]
description = Detects the execution of a renamed binary often used by attackers or malware leveraging the Sysmon OriginalFileName datapoint. Covers high-value targets like PowerShell, PsExec, certutil, and other commonly abused LOLBins.
search = Description="Execute processes remotely" OR Product="Sysinternals PsExec" OR Description IN ("Windows PowerShell*", "pwsh*") OR OriginalFileName IN ("certutil.exe", "cmstp.exe", "cscript.exe", "IE4UINIT.EXE", "finger.exe", "mshta.exe", "msiexec.exe", "msxsl.exe", "powershell_ise.exe", "powershell.exe", "psexec.c", "psexec.exe", "psexesvc.exe", "pwsh.dll", "reg.exe", "regsvr32.exe", "rundll32.exe", "WerMgr", "wmic.exe", "wscript.exe") NOT (Image IN ("*\\certutil.exe", "*\\cmstp.exe", "*\\cscript.exe", "*\\ie4uinit.exe", "*\\finger.exe", "*\\mshta.exe", "*\\msiexec.exe", "*\\msxsl.exe", "*\\powershell_ise.exe", "*\\powershell.exe", "*\\psexec.exe", "*\\psexec64.exe", "*\\PSEXESVC.exe", "*\\pwsh.exe", "*\\reg.exe", "*\\regsvr32.exe", "*\\rundll32.exe", "*\\wermgr.exe", "*\\wmic.exe", "*\\wscript.exe"))

[PowerShell File Masquerading Activity]
description = Detects PowerShell Rename-Item commands that change file extensions from documents to images or logs, indicative of masquerading for evasion
search = Image="*\\powershell.exe" OR OriginalFileName="PowerShell.EXE" CommandLine IN ("*rename-item*", "*ren*", "*rni*") CommandLine IN ("*.pdf *", "*.docx *", "*.xlsx *", "*.xls *") CommandLine IN ("*.jpg*", "*.png*", "*.log*", "*.txt*")

[Suspicious Usage Of ShellExec_RunDLL]
description = Detects suspicious usage of the ShellExec_RunDLL function to launch other commands as seen in the the raspberry-robin attack
search = CommandLine="*ShellExec_RunDLL*" CommandLine IN ("*regsvr32*", "*msiexec*", "*\\Users\\Public\\*", "*odbcconf*", "*\\Desktop\\*", "*\\Temp\\*", "*Invoke-*", "*iex*", "*comspec*")

[Salt Typhoon Campaign Process Execution Patterns]
description = Detects process execution patterns associated with Salt Typhoon campaign including CAB file extraction, registry file imports, and PowerShell execution with bypass flag. These techniques are used for payload deployment and persistence.
search = (Image IN ("*\\expand.exe", "*\\extrac32.exe") CommandLine="*.cab*") OR (Image="*\\reg.exe" CommandLine="*import*" CommandLine="*.reg*") OR (Image IN ("*\\powershell.exe", "*\\pwsh.exe") CommandLine="*-ex bypass*" CommandLine="*.ps1*")

[Salt Typhoon Malicious WdiSystem Service Indicators]
description = Detects indicators associated with Salt Typhoon threat actor's malicious WdiSystem service that masquerades as a legitimate Windows Diagnostic service. Detection includes references to WdiSystem, prints1m, and WdiSystemhost strings used by the threat actor.
search = CommandLine IN ("*WdiSystem*", "*prints1m*", "*WdiSystemhost*")

[New Service Creation Using Sc.EXE]
description = Detects the creation of a new service using the "sc.exe" utility, which can be abused for persistence and privilege escalation.
search = Image="*\\sc.exe" CommandLine="*create*" CommandLine="*binPath*" NOT (ParentImage IN ("C:\\Program Files (x86)\\Dropbox\\Client\\*", "C:\\Program Files\\Dropbox\\Client\\*") ParentImage="*\\Dropbox.exe")

[Registry Values set via CMD or PoSH]
description = Detects PowerShell or CMD processes that are attempting to set or delete registry values.
search = OriginalFileName IN ("PowerShell.EXE", "pwsh.dll", "Cmd.exe") OR Image IN ("*\\powershell.exe", "*\\pwsh.exe", "*\\cmd.exe") CommandLine="* reg *" CommandLine IN ("* add *", "* delete *")

[Suspicious Run Key Creation]
description = Detects windows run keys being created or modified via the "Set-ItemProperty" CMDLet.
search = Image IN ("*\\powershell.exe", "*\\cmd.exe") CommandLine IN ("*Set-ItemProperty*", "*Set-Item*") CommandLine="*\\Software\\Microsoft\\Windows\\CurrentVersion\\Run*"

[StopCrypt Ransomware Command Line Parameters]
description = Detects the distinctive command line parameters '--Admin IsNotAutoStart IsNotTask' used by StopCrypt ransomware during execution. These parameters are characteristic of this ransomware family and indicate an active infection.
search = CommandLine="*--Admin IsNotAutoStart IsNotTask"

[Discovery Commands Spawned from Non-Shell Parent Process]
description = Detects execution of common discovery commands (whoami, ipconfig, hostname) that are not spawned by cmd.exe or PowerShell. When these commands are executed by unusual parent processes, it may indicate malware or an attacker performing reconnaissance without using a visible command prompt.
search = Image IN ("*\\whoami.exe", "*\\ipconfig.exe", "*\\hostname.exe") NOT (ParentImage IN ("*\\cmd.exe", "*\\powershell.exe", "*\\powershell_ise.exe", "*\\pwsh.exe"))

[Suspicious Electron Application Child Processes]
description = Detects suspicious child processes of electron apps (teams, discord, slack, etc.). This could be a potential sign of ".asar" file tampering (See reference section for more information) or binary execution proxy through specific CLI arguments (see related rule)
search = ParentImage IN ("*\\chrome.exe", "*\\discord.exe", "*\\GitHubDesktop.exe", "*\\keybase.exe", "*\\msedge.exe", "*\\msedgewebview2.exe", "*\\msteams.exe", "*\\slack.exe", "*\\Teams.exe") Image IN ("*\\cmd.exe", "*\\cscript.exe", "*\\mshta.exe", "*\\powershell.exe", "*\\pwsh.exe", "*\\regsvr32.exe", "*\\wscript.exe") OR Image IN ("*\\AppData\\Local\\Temp\\*", "*\\Users\\Public\\*", "*\\Windows\\Temp\\*", "*:\\Temp\\*") NOT ((ParentImage="*\\chrome.exe" Image="*\\chrome.exe") OR (ParentImage="*\\discord.exe" Image="*\\discord.exe") OR (ParentImage="*\\GitHubDesktop.exe" Image="*\\GitHubDesktop.exe") OR (ParentImage="*\\keybase.exe" Image="*\\keybase.exe") OR (ParentImage="*\\msedge.exe" Image="*\\msedge.exe") OR (ParentImage="*\\msedgewebview2.exe" Image="*\\msedgewebview2.exe") OR (ParentImage="*\\msteams.exe" Image="*\\msteams.exe") OR (ParentImage="*\\slack.exe" Image="*\\slack.exe") OR (ParentImage="*\\teams.exe" Image="*\\teams.exe") OR Image IN ("C:\\Windows\\SysWOW64\\WerFault.exe", "C:\\Windows\\System32\\WerFault.exe")) NOT (ParentImage="*\\Discord.exe" CommandLine="*\\NVSMI\\nvidia-smi.exe*")

[Potentially Suspicious Electron Application CommandLine]
description = Detects potentially suspicious CommandLine of electron apps (teams, discord, slack, etc.). This could be a sign of abuse to proxy execution through a signed binary.
search = Image IN ("*\\chrome.exe", "*\\code.exe", "*\\discord.exe", "*\\GitHubDesktop.exe", "*\\keybase.exe", "*\\msedge_proxy.exe", "*\\msedge.exe", "*\\msedgewebview2.exe", "*\\msteams.exe", "*\\slack.exe", "*\\Teams.exe") OR OriginalFileName IN ("chrome.exe", "code.exe", "discord.exe", "GitHubDesktop.exe", "keybase.exe", "msedge_proxy.exe", "msedge.exe", "msedgewebview2.exe", "msteams.exe", "slack.exe", "Teams.exe") CommandLine IN ("*--browser-subprocess-path*", "*--gpu-launcher*", "*--renderer-cmd-prefix*", "*--utility-cmd-prefix*")

[Command Shell Spawned from PDF Viewer Application]
description = Detects command shell processes (cmd.exe or PowerShell) being spawned from PDF viewer applications while processing PDF files. This behavior may indicate exploitation of a PDF viewer vulnerability or a malicious PDF document executing embedded scripts.
search = ParentImage IN ("*\\msedge.exe", "*\\AcroRd32.exe", "*\\Acrobat.exe", "*\\FoxitReader.exe", "*\\FoxitPDFReader.exe", "*\\SumatraPDF.exe") ParentCommandLine="*.pdf*" Image IN ("*\\cmd.exe", "*\\powershell.exe", "*\\pwsh.exe")

[Rundll32 Execution with Suspicious Context]
description = Detects rundll32.exe execution spawned by command shells (cmd.exe or PowerShell) or from non-standard directories. This pattern is common in malware that uses rundll32 as a proxy to execute malicious DLLs while evading detection.
search = Image="*\\rundll32.exe" ParentImage IN ("*\\cmd.exe", "*\\powershell.exe", "*\\powershell_ise.exe", "*\\pwsh.exe") OR NOT (ParentImage IN ("*\\Windows\\System32\\*", "*\\Windows\\SysWOW64\\*", "*\\Program Files\\*", "*\\Program Files (x86)\\*"))

[Suspicious Scheduled Task Creation via Command Line]
description = Detects the creation of scheduled tasks via PowerShell cmdlets (New-ScheduledTask) or schtasks.exe through command shell processes. Attackers commonly use scheduled tasks to establish persistence or execute malicious payloads at specific times.
search = Image IN ("*\\powershell.exe", "*\\pwsh.exe", "*\\cmd.exe") CommandLine IN ("*New-ScheduledTask*", "*Register-ScheduledTask*", "*SCHTASKS*", "*/CREATE*")

[File Permission Modification via Icacls Denying Everyone Access]
description = Detects the use of icacls.exe to deny access permissions to the Everyone group (S-1-1-0), a technique commonly used by ransomware to prevent file recovery and by attackers to restrict access to malicious files or tools.
search = Image="*\\icacls.exe" CommandLine="*/deny *S-1-1-0:*"

[Suspicious Process Creation Location]
description = Detects a process being created from suspicious or uncommon directories.
search = Image IN ("*\\Downloads\\*", "*\\TEMP\\*", "*\\AppData\\Local\\*", "*\\Public\\*") OR ParentImage IN ("*\\Downloads\\*", "*\\TEMP\\*", "*\\AppData\\Local\\*", "*\\Public\\*")

[Access Token Manipulation via Get-System PowerShell]
description = Detects use of PowerShell Empire's Get-System module which performs access token manipulation via named pipe impersonation or token duplication to escalate to SYSTEM privileges.
search = CommandLine="*Get-System*" OR CommandLine="*Get-System.ps1*" OR (CommandLine="*Get-System*" CommandLine IN ("*-Technique NamedPipe*", "*-Technique Token*", "*-Technique RPCSS*"))

[Bypass UAC via Fodhelper.exe]
description = Identifies use of Fodhelper.exe to bypass User Account Control. Adversaries use this technique to execute privileged processes without triggering a UAC prompt.
search = ParentImage="*\\fodhelper.exe"

[Process Execution from Windows SxS Directory]
description = Detects process execution originating from or having a parent process in the Windows Side-by-Side (WinSxS) assembly directory. Attackers may exploit the trusted nature of this directory to execute malicious code or perform DLL sideloading attacks.
search = ParentImage="*Windows\\WinSxS*" OR Image="*Windows\\WinSxS*" NOT Image="*\\TiWorker.exe"

[WMI Process Execution via WMIC Process Call Create]
description = Detects use of WMIC to execute processes locally or remotely via "process call create". This is a common living-off-the-land technique used for execution and lateral movement.
search = Image="*\\wmic.exe" OR OriginalFileName="wmic.exe" CommandLine="*process*" CommandLine="*call*" CommandLine="*create*"

[System Reconnaissance via WMIC Discovery Queries]
description = Detects use of wmic.exe for system reconnaissance including process enumeration, service listing, user account discovery, and installed software queries. Adversaries use WMIC to gather information about the compromised host as part of discovery activities. Covers common recon patterns: 'wmic process', 'wmic service', 'wmic useraccount', 'wmic qfe', and 'wmic computersystem'.
search = Image="*\\WMIC.exe" OR OriginalFileName="wmic.exe" CommandLine IN ("*useraccount*", "*computersystem*", "*qfe*", "*nicconfig*", "*logicaldisk*", "*startup*") NOT (CommandLine="*process*" CommandLine="*call*" CommandLine="*create*")

[WMI Remote Process Execution via WMIC Node Parameter]
description = Detects WMIC execution targeting a remote system using the /node: parameter. Attackers use this for lateral movement and remote command execution without dropping additional tools.
search = Image="*\\wmic.exe" OR OriginalFileName="wmic.exe" CommandLine="*/node:*" NOT (CommandLine IN ("*/node:localhost*", "*/node:127.0.0.1*"))

[Windows Script Host Spawns Notepad++]
description = Detects wscript.exe or cmd.exe spawning Notepad++, a behavior associated with Pikabot malware. This technique uses legitimate applications as intermediaries to eventually execute malicious code through Notepad++ plugins.
search = ParentImage IN ("*\\wscript.exe", "*\\cscript.exe") Image="*\\notepad++.exe"

[Windows Defender Exclusions Added - Registry]
description = Detects the addition of Windows Defender exclusions via registry, which attackers use to prevent Defender from scanning their tools or payloads.
search = TargetObject="*\\Microsoft\\Windows Defender\\Exclusions*"

[Potential Persistence Via Logon Scripts - Registry]
description = Detects creation of the "UserInitMprLogonScript" registry value, which causes Windows to execute a script at user logon. Used by attackers for persistence and lateral movement.
search = TargetObject="*UserInitMprLogonScript*"

[UAC Bypass via Event Viewer]
description = Detects UAC bypass using Windows Event Viewer by hijacking the mscfile shell open command registry key, allowing execution with elevated privileges without a UAC prompt.
search = TargetObject="*\\mscfile\\shell\\open\\command*"

[Wdigest Enable UseLogonCredential]
description = Detects potential malicious modification of UseLogonCredential in WDigest registry key to enable clear-text credential caching in memory, allowing credential theft via LSASS.
search = TargetObject="*WDigest\\UseLogonCredential" Details="DWORD (0x00000001)"

[LockBit 3.0 Ransomware Registry Modifications]
description = Detects registry modifications associated with LockBit 3.0 ransomware including disabling SmartScreen, enabling auto-logon, disabling Windows Defender real-time protection, disabling Windows Event Logging, and disabling Windows Firewall.
search = (TargetObject="*\\SOFTWARE\\Policies\\Microsoft\\Windows\\System\\EnableSmartScreen*" Details="DWORD (0x00000000)") OR (TargetObject="*\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\*" TargetObject="*\\Enabled" Details="DWORD (0x00000000)") OR (TargetObject="*\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\AutoAdminLogon*" Details="DWORD (0x00000001)") OR (TargetObject="*\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection\\DisableRealtimeMonitoring*" Details="DWORD (0x00000001)") OR (TargetObject="*\\SOFTWARE\\Policies\\Microsoft\\WindowsFirewall\\*" TargetObject="*\\EnableFirewall" Details="DWORD (0x00000000)")

[Medusa Ransomware Registry Modifications]
description = Detects registry modifications associated with Medusa ransomware including Run key persistence with MSFEEditor and enabling linked network drive connections. These registry changes are used for persistence and lateral movement.
search = (TargetObject="*\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\MSFEEditor*" Details="*.exe") OR (TargetObject="*\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System\\EnabledLinkConnections*" Details="DWORD (0x00000001)")

[Registry Run Key Modification]
description = Detects modifications to the Windows Registry Run and RunOnce keys, which are commonly used by malware to establish persistence. These keys cause programs to execute automatically when a user logs on.
search = TargetObject IN ("*\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\*", "*\\Software\\Microsoft\\Windows\\CurrentVersion\\RunOnce\\*") NOT TargetObject="*\\Services\\WinDefend*"

[Service Creation]
description = Detects service modification via Set Value in "\System\CurrentControlSet\Services\". This detection is pertinent if service creation occurred in memory and command-line arguments were not logged.
search = Image="*\\services.exe" TargetObject="*\\System\\CurrentControlSet\\Services\\*" NOT TargetObject="*\\System\\CurrentControlSet\\Services\\WinDefend*"

[MedusaLocker Ransomware Scheduled Task Persistence]
description = Detects scheduled task creation events (Event ID 4698) that reference the svhost.exe or svhostt.exe executables in the user's Roaming AppData directory, which are characteristic of MedusaLocker ransomware persistence mechanisms.
search = source="WinEventLog:Security" EventCode=4698 TaskContent IN ("*svhost.exe*", "*svhostt.exe*", "*\\AppData\\Roaming\\*")

[ALPHV BlackCat Symlink Evaluation Policy Modification]
description = Detects the use of fsutil to enable symlink evaluation for remote-to-local (R2L) and remote-to-remote (R2R) links, a technique associated with ALPHV/BlackCat ransomware. Enabling these symlinks can allow ransomware to follow symbolic links to encrypt files on network shares and mapped drives.
search = CommandLine IN ("*fsutil behavior set SymlinkEvaluation R2L:1*", "*fsutil behavior set SymlinkEvaluation R2R:1*")

[ALPHV BlackCat VM and Shadow Copy Deletion Commands (Sysmon)]
description = Detects command execution patterns associated with ALPHV/BlackCat ransomware targeting virtualization infrastructure. This includes ESXi VM process termination, snapshot removal, Volume Shadow Copy deletion, and Windows Event Log clearing to maximize impact and hinder recovery.
search = CommandLine IN ("*esxcli vm process kill --type=force*", "*vim-cmd vmsvc/snapshot.removeall*", "*vssadmin.exe delete shadows*", "*vssadmin delete shadows*", "*wevtutil.exe cl*", "*wevtutil cl*")

[LockBit 3.0 Shadow Copy and Event Log Deletion]
description = Detects command execution patterns associated with LockBit 3.0 ransomware, including Volume Shadow Copy deletion via vssadmin or WMIC, and Windows Event Log clearing via wevtutil. These actions are typically performed to prevent forensic recovery and hide malicious activity.
search = CommandLine IN ("*vssadmin.exe delete shadows*", "*vssadmin delete shadows*", "*wevtutil.exe cl*", "*wevtutil cl*", "*wmic.exe Shadowcopy Delete*", "*wmic Shadowcopy Delete*")

[LockBit 3.0 Ransomware File Extension Detection]
description = Detects file creation with the .HLJkNskOq extension, which is the default encrypted file extension used by LockBit 3.0 ransomware. Multiple files with this extension indicate active ransomware encryption.
search = TargetFilename="*.HLJkNskOq"

[LockBit 3.0 Ransomware Registry Modifications (Sysmon)]
description = Detects registry modifications commonly performed by LockBit 3.0 ransomware to disable security controls, including disabling SmartScreen, Windows Event Logging, Windows Defender real-time protection, Windows Firewall, and enabling automatic admin logon for persistence.
search = (TargetObject="*\\SOFTWARE\\Policies\\Microsoft\\Windows\\System\\EnableSmartScreen*" Details="DWORD (0x00000000)") OR (TargetObject IN ("*\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\*", "*\\Enabled*") Details="DWORD (0x00000000)") OR (TargetObject="*\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\AutoAdminLogon*" Details="DWORD (0x00000001)") OR (TargetObject="*\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection\\DisableRealtimeMonitoring*" Details="DWORD (0x00000001)") OR (TargetObject IN ("*\\SOFTWARE\\Policies\\Microsoft\\WindowsFirewall\\*", "*Profile\\EnableFirewall*") Details="DWORD (0x00000000)")

[MedusaLocker Ransomware Registry Persistence]
description = Detects registry modifications associated with MedusaLocker ransomware, including Run key persistence using the MSFEEditor name and enabling link connections to facilitate network share encryption.
search = (TargetObject="*\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\*" TargetObject="*MSFEEditor" Details="*.exe") OR (TargetObject="*\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System\\EnableLinkedConnections*" Details="DWORD (0x00000001)")

[Network Connection to LockBit 3.0 Associated File Sharing Sites]
description = Detects network connections to file sharing and transfer services that have been associated with LockBit 3.0 ransomware data exfiltration activities. These services are commonly abused by ransomware operators to upload stolen data before encryption.
search = DestinationHostname IN ("*hanproud.com*", "*premiumize.com*", "*anonfiles.com*", "*sendspace.com*", "*fex.net*", "*transfer.sh*", "*send.exploit.in*")

[Remote Access Software Execution from Non-Standard Directory (Sysmon)]
description = Detects execution of remote access software (AnyDesk, TeamViewer, ScreenConnect) from non-standard directories. Scattered Spider and other threat actors commonly deploy these tools from unusual locations to establish persistent remote access while evading detection.
search = (Image="*\\AnyDesk.exe" NOT (Image IN ("*\\AppData\\*", "*\\Program Files (x86)\\AnyDesk*", "*\\Program Files\\AnyDesk*"))) OR (Image="*\\TeamViewer.exe" NOT (Image IN ("*\\AppData\\*", "*\\Program Files (x86)\\TeamViewer*", "*\\Program Files\\TeamViewer*"))) OR (Image="*\\ScreenConnect.exe" NOT (Image IN ("*\\AppData\\*", "*\\Program Files (x86)\\ScreenConnect*", "*\\Program Files\\ScreenConnect*")))

[WMI Event Subscription Persistence]
description = Detects creation of WMI event subscriptions used for fileless persistence. Adversaries register WMI event filters, consumers, and bindings in the root/subscription namespace to execute arbitrary code when a triggering event occurs (e.g., system uptime threshold). Covers Sysmon EventIDs 19 (WmiEventFilter), 20 (WmiEventConsumer), 21 (WmiEventConsumerToFilter).
search = EventCode IN (19, 20, 21)
