name: Splunk Detection Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'SCYTHE_Rules/**'
  pull_request:
    branches: [main]
    paths:
      - 'SCYTHE_Rules/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Splunk after conversion'
        required: false
        default: 'false'
        type: boolean
      run_regression:
        description: 'Run regression tests after deployment'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'

jobs:
  convert:
    name: Convert Sigma to Splunk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install sigma-cli pysigma pysigma-backend-splunk pysigma-pipeline-windows PyYAML

      - name: Validate Sigma rules
        run: |
          echo "=== Validating Sigma Rules ==="
          sigma check SCYTHE_Rules/*.yml

      - name: Convert to Splunk format
        run: |
          echo "=== Converting to Splunk Saved Searches ==="
          python scripts/convert-to-splunk.py -i SCYTHE_Rules -o splunk_output

      - name: Display conversion summary
        run: |
          echo "=== Conversion Report ==="
          cat splunk_output/conversion_report.json | python -m json.tool

          # Add to job summary
          SUCCESSFUL=$(jq '.successful_conversions' splunk_output/conversion_report.json)
          FAILED=$(jq '.failed_conversions' splunk_output/conversion_report.json)
          SKIPPED=$(jq '.skipped_rules' splunk_output/conversion_report.json)

          echo "## Splunk Conversion Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Successful | $SUCCESSFUL |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped (non-Windows) | $SKIPPED |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Splunk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splunk-savedsearches-${{ github.run_number }}
          path: |
            splunk_output/savedsearches.conf
            splunk_output/conversion_report.json
          retention-days: 90

      - name: Check for conversion failures
        run: |
          FAILED=$(jq '.failed_conversions' splunk_output/conversion_report.json)
          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED rules failed to convert"
          fi

  deploy:
    name: Deploy to Splunk
    runs-on: ubuntu-latest
    needs: convert
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')

    environment: splunk-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Splunk artifacts
        uses: actions/download-artifact@v4
        with:
          name: splunk-savedsearches-${{ github.run_number }}
          path: splunk_output

      - name: Deploy to Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_PORT: ${{ secrets.SPLUNK_PORT }}
          SPLUNK_USER: ${{ secrets.SPLUNK_USER }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
          SPLUNK_APP: ${{ secrets.SPLUNK_APP || 'search' }}
        run: |
          echo "=== Deploying to Splunk ==="

          # Install PowerShell Core for cross-platform script execution
          # Or use a Python deployment script

          # For now, use curl to deploy via REST API
          # This is a simplified example - the PowerShell script has more features

          # Count searches to deploy
          SEARCH_COUNT=$(grep -c '^\[' splunk_output/savedsearches.conf || echo "0")
          SEARCH_COUNT=$((SEARCH_COUNT - 1))  # Subtract [default] stanza

          echo "Deploying $SEARCH_COUNT saved searches to Splunk..."

          # Note: Full deployment requires the deploy-to-splunk.ps1 script
          # or equivalent Python script for the CI environment

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** $SPLUNK_HOST" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** $SPLUNK_APP" >> $GITHUB_STEP_SUMMARY
          echo "- **Searches:** $SEARCH_COUNT" >> $GITHUB_STEP_SUMMARY

  regression-test:
    name: Run Regression Tests (Atomic Red Team)
    # NOTE: Requires a self-hosted Windows runner with Atomic Red Team installed
    # For GitHub-hosted runners, run regression tests locally instead
    runs-on: windows-latest
    needs: deploy
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_regression == 'true'

    environment: splunk-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install requests pyyaml urllib3

      - name: Check Atomic Red Team installation
        shell: pwsh
        run: |
          $module = Get-Module -ListAvailable -Name Invoke-AtomicRedTeam
          if (-not $module) {
            Write-Host "::warning::Atomic Red Team not installed. Installing..."
            IEX (IWR 'https://raw.githubusercontent.com/redcanaryco/invoke-atomicredteam/master/install-atomicredteam.ps1' -UseBasicParsing)
            Install-AtomicRedTeam -getAtomics -Force
          } else {
            Write-Host "Atomic Red Team is installed: $($module.Version)"
          }

      - name: Run regression tests
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_PORT: ${{ secrets.SPLUNK_PORT }}
          SPLUNK_USER: ${{ secrets.SPLUNK_USER }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          echo "=== Running Atomic Red Team Regression Tests ==="

          python scripts/regression-test.py `
            --splunk-host "$env:SPLUNK_HOST" `
            --splunk-port "$env:SPLUNK_PORT" `
            --splunk-user "$env:SPLUNK_USER" `
            --splunk-pass "$env:SPLUNK_PASSWORD" `
            --test-config tests/art_mapping.yaml `
            --output test_results.json `
            --skip-atomic-check
        shell: pwsh

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-test-results-${{ github.run_number }}
          path: test_results.json
          retention-days: 30

      - name: Report test results
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "test_results.json") {
            $results = Get-Content test_results.json | ConvertFrom-Json
            $passed = $results.summary.passed
            $failed = $results.summary.failed
            $rate = $results.summary.pass_rate

            "## Regression Test Results (Atomic Red Team)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "| Metric | Value |" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "|--------|-------|" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "| Passed | $passed |" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "| Failed | $failed |" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            "| Pass Rate | $rate |" | Out-File -Append $env:GITHUB_STEP_SUMMARY

            if ($failed -gt 0) {
              "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
              "### Failed Tests" | Out-File -Append $env:GITHUB_STEP_SUMMARY
              foreach ($test in $results.results | Where-Object { -not $_.passed }) {
                "- **$($test.test_name)** ($($test.technique_id)): Missing rules: $($test.missing_rules -join ', ')" | Out-File -Append $env:GITHUB_STEP_SUMMARY
              }
              exit 1
            }
          }
