title: Microsoft 365 Mailbox Permission Delegation or Application Owner Added
id: 539170d6-ea17-493c-a3fb-4dc7f04f1042
status: experimental
description: Detects mailbox permission delegation or application owner changes in Microsoft 365. Attackers may abuse these permissions to maintain persistent access to email communications, intercept sensitive information, or establish OAuth application backdoors for long-term access.
references:
    - https://support.scythe.io/knowledge/m365
    - https://learn.microsoft.com/en-us/purview/audit-log-activities
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/03/27
tags:
    - attack.persistence
    - attack.t1098.002
    - attack.collection
    - attack.t1114.002
logsource:
    product: m365
    service: threat_management
detection:
    selection:
        EventSource:
            - UnifiedAuditLog
        Operation|contains:
            - 'Add owner to application'
            - 'Add-MailboxPermission'
            - 'Set-Mailbox'
    condition: selection
falsepositives:
    - IT administrators configuring mailbox permissions for legitimate business purposes.
level: medium
