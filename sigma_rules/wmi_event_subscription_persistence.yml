title: WMI Event Subscription Persistence
id: 0f06a3a5-6a09-413f-8743-e6cf35561297
status: test
description: >
    Detects creation of WMI event subscriptions used for fileless persistence.
    Adversaries register WMI event filters, consumers, and bindings in the root/subscription
    namespace to execute arbitrary code when a triggering event occurs (e.g., system uptime threshold).
    Covers Sysmon EventIDs 19 (WmiEventFilter), 20 (WmiEventConsumer), 21 (WmiEventConsumerToFilter).
references:
    - https://attack.mitre.org/techniques/T1546/003/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1546.003/T1546.003.yaml
    - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon#event-id-19-wmievent-wmieventfilter-activity-detected
    - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon#event-id-20-wmievent-wmieventconsumer-activity-detected
    - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon#event-id-21-wmievent-wmieventconsumertofilter-activity-detected
author: Tom Ueltschi (@c_APT_ure), adapted for this project
date: 2024-01-15
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1546.003
logsource:
    product: windows
    category: wmi_event
detection:
    selection:
        EventID:
            - 19
            - 20
            - 21
    condition: selection
falsepositives:
    - Legitimate WMI event subscriptions used by monitoring or management software
    - Microsoft SCCM and other endpoint management tools may create WMI subscriptions
    - Antivirus products occasionally register WMI event consumers
level: medium
