title: Download Utility with Custom DNS Server
id: 01d1faae-daa5-48c6-9abd-1af30d7d7862
status: experimental
description: Detects the use of curl or wget with the --dns-servers flag to specify a custom DNS server. Bifrost and other malware use this technique to resolve malicious domains through attacker-controlled DNS infrastructure while evading DNS-based security controls.
references:
    - https://unit42.paloaltonetworks.com/new-linux-variant-bifrost-malware/
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/03/18
tags:
    - attack.command_and_control
    - attack.t1071.004
    - attack.execution
    - attack.t1059.004
logsource:
    product: linux
    category: process_creation
detection:
    selection_dns:
        CommandLine|contains:
            - '--dns-servers'
    selection_image:
        Image|endswith:
            - '/curl'
            - '/wget'
    condition: all of selection_*
falsepositives:
    - Network troubleshooting using custom DNS servers.
level: medium
