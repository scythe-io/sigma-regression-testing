title: Network Share Enumeration via Net Commands
id: 20f1097d-81c1-405c-8380-32174d493bbb
status: test
description: >
    Detects network share enumeration using built-in Windows net.exe and net1.exe commands
    with 'share' or 'view' subcommands. Adversaries use these commands to discover accessible
    network shares for lateral movement and data exfiltration. The 'net share' command lists
    local shares while 'net view' discovers remote shares on a specified host or domain.
references:
    - https://attack.mitre.org/techniques/T1135/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1135/T1135.yaml
    - https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-r2-and-2012/hh875576(v=ws.11)
author: Sigma Detection Engineering
date: 2024-01-15
tags:
    - attack.discovery
    - attack.t1135
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
        CommandLine|contains:
            - ' share'
            - ' view'
    condition: selection
falsepositives:
    - System administrators legitimately auditing shares
    - Monitoring scripts that check share availability
    - IT inventory tools that enumerate network resources
level: medium
