title: Remote Access Software Execution from Non-Standard Directory (Sysmon)
id: 18145bec-4354-48ff-9446-55a8e306e53b
related:
    - id: 065b00ca-5d5c-4557-ac95-64a6d0b64d86
      type: similar
status: experimental
description: Detects execution of remote access software (AnyDesk, TeamViewer, ScreenConnect) from non-standard directories. Scattered Spider and other threat actors commonly deploy these tools from unusual locations to establish persistent remote access while evading detection.
references:
    - https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1219/T1219.md
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-320a
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/01/31
tags:
    - attack.command-and-control
    - attack.t1219
    - attack.persistence
    - attack.t1133
logsource:
    product: windows
    category: process_creation
detection:
    selection_anydesk:
        Image|endswith: '\AnyDesk.exe'
    filter_anydesk:
        Image|contains:
            - '\AppData\'
            - '\Program Files (x86)\AnyDesk'
            - '\Program Files\AnyDesk'
    selection_teamviewer:
        Image|endswith: '\TeamViewer.exe'
    filter_teamviewer:
        Image|contains:
            - '\AppData\'
            - '\Program Files (x86)\TeamViewer'
            - '\Program Files\TeamViewer'
    selection_screenconnect:
        Image|endswith: '\ScreenConnect.exe'
    filter_screenconnect:
        Image|contains:
            - '\AppData\'
            - '\Program Files (x86)\ScreenConnect'
            - '\Program Files\ScreenConnect'
    condition: (selection_anydesk and not filter_anydesk) or (selection_teamviewer and not filter_teamviewer) or (selection_screenconnect and not filter_screenconnect)
falsepositives:
    - Portable versions of remote access software used by IT support.
level: high
