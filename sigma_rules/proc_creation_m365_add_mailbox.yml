title: Microsoft 365 Mailbox Permission Delegation via PowerShell
id: 4c7f11a8-1d47-4ced-bce1-e88233f33337
status: experimental
description: Detects execution of the Add-MailboxPermission PowerShell cmdlet, which grants another user access to a mailbox. Attackers commonly abuse this to maintain persistent access to email communications or to exfiltrate sensitive data by delegating access to a compromised account.
references:
    - https://support.scythe.io/knowledge/m365
    - https://learn.microsoft.com/en-us/powershell/module/exchange/add-mailboxpermission
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/03/27
tags:
    - attack.persistence
    - attack.t1098.002
    - attack.collection
    - attack.t1114.002
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\powershell_ise.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Add-MailboxPermission'
    condition: selection
falsepositives:
    - IT administrators configuring mailbox delegation for legitimate business purposes.
level: medium
