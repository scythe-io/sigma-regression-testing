title: Domain Discovery via NET Command
id: 4b512931-574c-4faf-a579-af1040f6d8db
status: experimental
description: Detects the use of net.exe or net1.exe to enumerate domain users, groups, and computers. These commands are commonly used during the discovery phase of an attack to map out Active Directory structure and identify high-value targets.
references:
    - https://www.mandiant.com/resources/blog/session-hijacking-citrix-cve-2023-4966
    - https://attack.mitre.org/techniques/T1087/002/
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/02/13
tags:
    - attack.discovery
    - attack.t1069.002
    - attack.t1087.002
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
    selection_cmdline:
        CommandLine|contains:
            - 'admins'
            - 'users'
            - 'computers'
            - '/domain'
    condition: all of selection_*
falsepositives:
    - System administrators performing legitimate Active Directory queries.
level: medium
