title: Process Execution from Windows Defender NisSrv Directory
id: b3157617-7d1d-43db-8990-16ca0a1e9d18
status: experimental
description: Detects process execution originating from the Windows Defender Network Inspection Service (NisSrv) directory. Attackers may abuse this trusted location for DLL sideloading or to evade security controls by executing malicious code from within Defender's own directory structure.
references:
    - https://support.scythe.io/knowledge/april-2024-winsxs-sideloading
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/04/22
tags:
    - attack.defense-evasion
    - attack.execution
    - attack.t1059.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent_img:
        ParentImage|contains:
            - 'Windows Defender\NisSrv'
    selection_img:
        Image|contains:
            - 'Windows Defender\NisSrv'
    filter_legitimate:
        Image|endswith:
            - '\MsMpEng.exe'
            - '\NisSrv.exe'
    condition: (selection_parent_img or selection_img) and not filter_legitimate
falsepositives:
    - Legitimate Windows Defender Network Inspection Service operations.
level: medium
