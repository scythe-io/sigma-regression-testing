title: PowerShell File Masquerading Activity
id: c3d7e891-4b2a-4f5c-9a8d-7e6f4b3c2a19
status: experimental
description: Detects PowerShell Rename-Item commands that change file extensions from documents to images or logs, indicative of masquerading for evasion
references:
    - https://attack.mitre.org/techniques/T1036/008/
author: Tyler Casey, SCYTHE  
date: 2024/01/16
tags:
    - attack.defense-evasion
    - attack.t1036.008
    - attack.execution
    - attack.t1059.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_powershell:
        - Image|endswith: '\powershell.exe'
        - OriginalFileName: 'PowerShell.EXE'
    selection_rename:
        CommandLine|contains: 
            - 'rename-item'
            - 'ren'
            - 'rni'
    selection_suspicious_ext:
        CommandLine|contains:
            - '.pdf '
            - '.docx '
            - '.xlsx '
            - '.xls '
    selection_target_ext:
        CommandLine|contains:
            - '.jpg'
            - '.png'
            - '.log'
            - '.txt'
    condition: all of selection_*
falsepositives:
    - Legitimate file organization scripts
    - Image conversion utilities
    - Log rotation scripts
level: medium