title: Azure CLI Discovery Commands
id: 2a3a051b-946a-442e-b3ff-def01db439a2
status: experimental
description: Detects execution of Azure CLI commands used for infrastructure reconnaissance from a Windows host. Multiple Azure discovery commands executed in a short timeframe may indicate an attacker enumerating cloud resources after compromising credentials or a host with Azure CLI access.
references:
    - https://support.scythe.io/knowledge/azure-resource-group-backdoor
    - https://learn.microsoft.com/en-us/cli/azure/
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/03/28
tags:
    - attack.execution
    - attack.t1059
    - attack.discovery
    - attack.t1087.004
    - attack.t1580
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'az vm run-command'
            - 'az vm show'
            - 'az network nic'
            - 'az network nsg'
            - 'az network public-ip'
            - 'az vm list'
    condition: selection
falsepositives:
    - Administrators using Azure CLI for legitimate cloud management tasks.
level: medium
