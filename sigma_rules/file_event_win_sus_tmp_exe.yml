title: Executable File Creation in User Temp Directories
id: b0bb40b3-d9c7-48e7-8172-0e7e59d09366
status: experimental
description: Detects creation of executable files in user temp directories (AppData\Local) by processes outside of Program Files. This technique is commonly used by malware including StopCrypt ransomware to stage payloads before execution.
references:
    - https://blog.sonicwall.com/en-us/2024/03/new-multi-stage-stopcrypt-ransomware/
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/04/04
tags:
    - attack.persistence
    - attack.t1053
    - attack.defense-evasion
    - attack.t1027
logsource:
    product: windows
    category: file_event
detection:
    selection_path:
        TargetFilename|contains:
            - '\AppData\Local\'
    selection_extension:
        TargetFilename|endswith:
            - '.exe'
            - '.ps1'
            - '.bat'
            - '.msi'
            - '.py'
            - '.wsf'
            - '.com'
            - '.vbs'
    filter_program_files:
        Image|contains:
            - '\Program Files\'
            - '\Program Files (x86)\'
    filter_pspolicy:
        TargetFilename|contains:
            - 'PSScriptPolicyTest'
    condition: selection_path and selection_extension and not filter_program_files and not filter_pspolicy
falsepositives:
    - Legitimate software installers that extract to temp directories.
level: high
