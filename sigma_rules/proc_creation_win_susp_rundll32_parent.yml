title: Rundll32 Execution with Suspicious Context
id: e52a60a2-7f60-4970-9b91-5a1e5d1e6cba
status: experimental
description: Detects rundll32.exe execution spawned by command shells (cmd.exe or PowerShell) or from non-standard directories. This pattern is common in malware that uses rundll32 as a proxy to execute malicious DLLs while evading detection.
references:
    - https://support.scythe.io/knowledge/grimresource
    - https://lolbas-project.github.io/lolbas/Binaries/Rundll32/
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/07/23
tags:
    - attack.execution
    - attack.t1059
    - attack.defense-evasion
    - attack.t1218.011
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        Image|endswith:
            - '\rundll32.exe'
    selection_parent_shell:
        ParentImage|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\powershell_ise.exe'
            - '\pwsh.exe'
    filter_standard_locations:
        ParentImage|contains:
            - '\Windows\System32\'
            - '\Windows\SysWOW64\'
            - '\Program Files\'
            - '\Program Files (x86)\'
    condition: selection_img and (selection_parent_shell or not filter_standard_locations)
falsepositives:
    - Legitimate administrative scripts that invoke rundll32 for system configuration.
level: medium
