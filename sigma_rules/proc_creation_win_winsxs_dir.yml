title: Process Execution from Windows SxS Directory
id: c8d71a92-43f3-4a8b-b2c1-9e7f8d6a5e4b
status: experimental
description: Detects process execution originating from or having a parent process in the Windows Side-by-Side (WinSxS) assembly directory. Attackers may exploit the trusted nature of this directory to execute malicious code or perform DLL sideloading attacks.
references:
    - https://support.scythe.io/knowledge/april-2024-winsxs-sideloading
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/04/22
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense-evasion
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent_img:
        ParentImage|contains:
            - 'Windows\WinSxS'
    selection_img:
        Image|contains:
            - 'Windows\WinSxS'
    filter_legitimate:
        Image|endswith:
            - '\TiWorker.exe'
    condition: (selection_parent_img or selection_img) and not filter_legitimate
falsepositives:
    - Legitimate Windows servicing operations via TiWorker.exe.
level: medium
