title: Browser Credential Theft via Login Data File Access
id: 3d111226-d09a-4911-8715-fe11664f960d
status: test
description: >
    Detects access to browser credential storage files (Chrome, Edge, Firefox, Opera Login Data)
    which contain saved usernames and passwords. Adversaries copy these SQLite database files
    to exfiltrate credentials. Also detects known credential harvesting tools targeting browsers
    such as LaZagne, WebBrowserPassView, and esentutl-based extraction of Chrome Login Data.
references:
    - https://attack.mitre.org/techniques/T1555/003/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1555.003/T1555.003.yaml
    - https://github.com/AlessandroZ/LaZagne
author: Sigma Detection Engineering
date: 2024-01-15
tags:
    - attack.credential-access
    - attack.t1555.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_logindata_access:
        CommandLine|contains:
            - '\Google\Chrome\User Data\Default\Login Data'
            - '\Microsoft\Edge\User Data\Default\Login Data'
            - '\Mozilla\Firefox\Profiles\'
            - '\Opera Software\Opera Stable\Login Data'
    selection_lazagne:
        Image|endswith: '\lazagne.exe'
    selection_lazagne_cmd:
        CommandLine|contains: 'lazagne'
        CommandLine|contains: 'browsers'
    selection_webbrowserpassview:
        Image|endswith: '\WebBrowserPassView.exe'
    selection_esentutl_logindata:
        Image|endswith: '\esentutl.exe'
        CommandLine|contains: 'Login Data'
    condition: selection_logindata_access or selection_lazagne or selection_lazagne_cmd or selection_webbrowserpassview or selection_esentutl_logindata
falsepositives:
    - Browser backup utilities that legitimately copy profile data
    - IT forensics tools examining browser artifacts
    - User profile migration tools
level: high
