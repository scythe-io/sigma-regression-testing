title: ALPHV BlackCat VM and Shadow Copy Deletion Commands
id: c8b86c71-f113-493c-8624-1052f7b94550
status: experimental
description: Detects command execution patterns associated with ALPHV/BlackCat ransomware targeting virtualization infrastructure. This includes ESXi VM process termination, snapshot removal, Volume Shadow Copy deletion, and Windows Event Log clearing to maximize impact and hinder recovery.
references:
    - https://www.varonis.com/blog/blackcat-ransomware
author: Tyler Casey @1qazCasey, @scythe_io
date: 2024/01/03
tags:
    - attack.impact
    - attack.t1485
    - attack.defense_evasion
    - attack.t1490
    - attack.t1070.001
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'esxcli vm process kill --type=force'
            - 'vim-cmd vmsvc/snapshot.removeall'
            - 'vssadmin.exe delete shadows'
            - 'vssadmin delete shadows'
            - 'wevtutil.exe cl'
            - 'wevtutil cl'
    condition: selection
falsepositives:
    - Virtualization administrators performing legitimate VM management tasks.
level: high
