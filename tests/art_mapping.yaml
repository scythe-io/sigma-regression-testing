# Atomic Red Team Test Mapping for Sigma Rules
#
# Maps Sigma detection rules to Atomic Red Team tests for regression testing.
# Each test executes an atomic and validates that the expected Sigma rule fires.
#
# Find Atomic Test GUIDs at: https://atomicredteam.io/atomics/
# Or run: Invoke-AtomicTest T1070.001 -ShowDetailsBrief
#
# Fields:
#   - name: Human-readable test name
#   - description: What this test validates
#   - technique_id: MITRE ATT&CK technique ID
#   - atomic_test_guid: The specific Atomic Red Team test GUID
#   - expected_rules: Sigma rule titles (Splunk saved search names) that should fire
#   - input_arguments: Optional parameters for the atomic test
#   - cleanup: Whether to run cleanup after test (default: true)
#   - timeout_seconds: Max wait time for detection (default: 300)

tests:
  # ============================================
  # Defense Evasion - T1070 (Indicator Removal)
  # ============================================

  - name: "Clear Event Logs via PowerShell"
    description: "Validates detection of event log clearing via PowerShell Clear-EventLog cmdlet"
    technique_id: "T1070.001"
    atomic_test_guid: "b13e9306-3351-4b4b-a6e8-477358b0b498"
    expected_rules:
      - "Windows Event Log Manipulation via PowerShell"
    cleanup: false  # Logs are already cleared

